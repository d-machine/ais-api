configType: LIST
version: 1.0

queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT
      ib.id as brand_id,
      ib.brand_name,
      ib.category_id
    FROM wms.item_brand ib
    WHERE ib.category_id = $1 AND ib.is_active = true
  payload:
    - category_id
  path: []
  options:
    applyFiltering: false
    applySorting: false
    applyPagination: false

columns:
  - name: brand_id
    label: ID
    visible: false
  - name: brand_name
    label: Brand Name
    visible: true
  - name: category_id
    label: Category ID
    visible: false
