version: 1.0
configName: city-details

# Form-level actions (global)
applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE
actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard Changes
      EDIT: Discard Changes
  CLOSE:
    visible: true
    label:
      VIEW: Close

sections:
  # Section 1: City Details (FIELDS)
  - sectionType: FIELDS
    sectionName: city_details
    label: City Details

    # Section-level data fetching
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id,
          name as city_name,
          code as city_code,
          descr
        FROM
          wms.city
        WHERE
          id = $1
      payload:
        - _context.id # Explicit: from initial context
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    # Section-level actions
    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Create City
          EDIT: Update City
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query:
            ADD: |
              SELECT wms.insert_city($1, $2, $3, $4) as id;
            EDIT: |
              SELECT wms.update_city($1, $2, $3, $4, $5) as id;
          payload:
            ADD:
              - city_details.city_name
              - city_details.city_code
              - city_details.descr
            EDIT:
              - _context.id # City ID
              - city_details.city_name
              - city_details.city_code
              - city_details.descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar

      CANCEL:
        label: Discard Changes
        icon: ClipboardX
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    # Row-based layout
    rows:
      - columns:
          - field: city_name
            span: 8
          - field: city_code
            span: 4
      - columns:
          - field: descr
            span: 12

    # Field definitions
    fields:
      - name: city_name
        label: City Name
        type: TEXT
        readonly:
          - VIEW
        required: true

      - name: city_code
        label: City Code
        type: TEXT
        readonly:
          - VIEW
        required: true
        maxLength: 3

      - name: descr
        label: Description
        type: TEXTAREA
        readonly:
          - VIEW
