configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: City Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id, name as city_name, code as city_code, descr
        FROM wms.city
        WHERE id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create City
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.insert_city($1, $2, $3, $4) as id;
          payload:
            - city_name
            - city_code
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    # Row-based layout
    rows:
      - columns:
          - field: city_name
            span: 8
          - field: city_code
            span: 4
      - columns:
          - field: descr
            span: 12
    
    # Field definitions
    fields:
      - name: city_name
        label: City Name
        type: TEXT
        required: true
      - name: city_code
        label: City Code
        type: TEXT
        required: true
        maxLength: 3
      - name: descr
        label: Description
        type: TEXTAREA
