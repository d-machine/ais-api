sections:
  - sectionType: FIELDS
    sectionName: City Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id as city_id, name as city_name, descr as descr
        FROM
          wms.city
        WHERE
          id = $1
      payload:
        - city_id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create City
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: |
            SELECT wms.insert_city($1, $2, $3, $4) as id;
          payload:
            - city_name
            - city_code
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    fields:
      - name: city_name
        label: City Name
        type: TEXT
        required: true
      - name: city_code
        label: City Code
        type: TEXT
        required: true
      - name: descr
        label: Descr
        type: TEXTAREA
