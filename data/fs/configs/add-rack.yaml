configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Rack Details
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Save
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.insert_rack($1, $2, $3, $4, $5) as id;
          payload:
            - code
            - name
            - descr
            - capacity
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Cancel
    
    fields:
      - name: code
        label: Rack Code
        type: TEXT
        required: true
      
      - name: name
        label: Rack Name
        type: TEXT
        required: true
      
      - name: descr
        label: Description
        type: TEXTAREA
        required: false
      
      - name: capacity
        label: Capacity
        type: NUMBER
        required: false
