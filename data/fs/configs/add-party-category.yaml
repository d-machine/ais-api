configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Party Category Details
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create Category
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.insert_party_category($1, $2, $3) as id;
          payload:
            - category_name
            - discount_percentage
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    rows:
      - columns:
          - field: category_name
            span: 12
      - columns:
          - field: discount_percentage
            span: 6
    
    fields:
      - name: category_name
        label: Category Name
        type: TEXT
        required: true
      - name: discount_percentage
        label: Discount Percentage
        type: NUMBER
        required: true
        defaultValue: 0.00
