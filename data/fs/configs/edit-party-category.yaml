configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Party Category Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id,
          name as category_name,
          discount_percentage
        FROM wms.party_category
        WHERE id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Update Category
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.update_party_category($1, $2, $3, $4) as id;
          payload:
            - id
            - category_name
            - discount_percentage
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    rows:
      - columns:
          - field: category_name
            span: 12
      - columns:
          - field: discount_percentage
            span: 6
    
    fields:
      - name: category_name
        label: Category Name
        type: TEXT
        required: true
      - name: discount_percentage
        label: Discount Percentage
        type: NUMBER
        required: true
