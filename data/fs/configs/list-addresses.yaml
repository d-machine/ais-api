configType: LIST
version: 1.0

queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        a.id,
        a.adr1,
        a.adr2,
        a.adr3,
        CONCAT_WS(', ', a.adr1, a.adr2, a.adr3, c.name) as full_address,
        c.name as city_name,
        d.name as district_name,
        s.name as state_name,
        co.name as country_name,
        a.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.address a
        LEFT JOIN wms.city c ON a.city_id = c.id
        LEFT JOIN wms.district d ON a.district_id = d.id
        LEFT JOIN wms.state s ON a.state_id = s.id
        LEFT JOIN wms.country co ON a.country_id = co.id
        LEFT JOIN administration.user u ON a.lub = u.id
      WHERE
        a.is_active = true
    ) as addresses
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: true
    pageSize: 50
    pageSizeOptions: [10, 25, 50, 100]
    onSuccess: refresh
    onFailure: showErrorPage
  path: []

applicableActions:
  - add
  - edit
  - delete

actionConfig:
  add:
    label: Add Address
    actionType: DISPLAY_FORM
    shortcut: "F2"
    formConfig: add-address
    onSuccess: refresh
    accessTypeRequired: 7-ADD
  
  edit:
    label: Edit Address
    actionType: DISPLAY_FORM
    shortcut: "F4"
    level: ROW
    formConfig: edit-address
    payload:
      - id
    onSuccess: refresh
    accessTypeRequired: 7-EDIT

  delete:
    label: Delete Address
    actionType: EXECUTE_QUERY
    shortcut: "F8"
    level: ROW
    confirmationRequired: true
    confirmationMessage: "Are you sure you want to delete this address?"
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: SELECT wms.delete_address($1, $2) as id;
      payload:
        - id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - delete
    onSuccess: refresh
    onFailure: showErrorSnackbar

columns:
  - name: id
    label: ID
    visible: false
    sortable: false
  - name: full_address
    label: Full Address
    visible: false
    filterable: true
  - name: adr1
    label: Address Line 1
    visible: true
    sortable: true
    filterable: true
    width: 200
  - name: adr2
    label: Address Line 2
    visible: true
    width: 150
  - name: adr3
    label: Address Line 3
    visible: true
    width: 150
  - name: city_name
    label: City
    visible: true
    sortable: true
    filterable: true
    width: 120
  - name: district_name
    label: District
    visible: true
    sortable: true
    filterable: true
    width: 120
  - name: state_name
    label: State
    visible: true
    sortable: true
    filterable: true
    width: 120
  - name: country_name
    label: Country
    visible: true
    sortable: true
    filterable: true
    width: 120
  - name: last_updated_at
    label: Last Updated At
    visible: true
    dataType: datetime
    format: "DD/MM/YYYY HH:mm"
    sortable: true
    defaultSort: DESC
  - name: last_updated_by_name
    label: Updated By
    visible: true
