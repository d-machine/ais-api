queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        v.id as vendor_id,
        v.vendor_type as vendor_type,
        v.name as vendor_name,
        v.add1 as add1,
        v.add2 as add2,
        v.add3 as add3,
        v.city as city,
        v.pincode as pincode,
        v.person_name as person_name,
        v.telephone as telephone,
        v.email as email,
        v.udate as udate,
        v.salesman as salesman,
        v.pan_no as pan_no,
        v.cr_limit as cr_limit,
        v.cr_days as cr_days,
        v.gstno as gstno,
        v.aadhar_no as aadhar_no,
        v.sales_head as sales_head,
        v.director as director,
        v.manager as manager,
        cd.id as city_district_id,
        cd.name as city_district_name,
        sm.id as state_id,
        sm.name as state_name,
        cm.id as country_id,
        cm.name as country_name,
        v.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.vendor v
        LEFT JOIN wms.city_district cd ON v.city_district_id = cd.id
        LEFT JOIN wms.state sm ON v.state_id = sm.id
        LEFT JOIN wms.country cm ON v.country_id = cm.id
        LEFT JOIN administration.user u ON v.lub = u.id
      WHERE
        v.is_active = true
    ) as vendors
  options:
    applyFiltering: true
    applySorting: true
    applyPagenation: true   
  path:
    - queryInfo
applicableActions:
  - add
  - edit
  - delete
actionConfig:
  add:
    label: Add Vendor
    actionType: DISPLAY_FORM
    formConfig: add-vendor
    onSuccess: refresh
    accessTypeRequired: 7-ADD 
  edit:
    label: Edit Vendor
    actionType: DISPLAY_FORM
    formConfig: add-vendor
    accessTypeRequired: 7-EDIT
    payload:
      - vendor_id
    onSuccess: refresh
  delete:
    label: Delete Vendor
    actionType: EXECUTE_QUERY
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        SELECT wms.delete_vendor($1, $2) as id;
      payload:
        - vendor_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar

