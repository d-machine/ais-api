queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        v.id as vendor_id,
        v.vendor_type as vendor_type,
        v.name as vendor_name,
        v.add1 as add1,
        v.add2 as add2,
        v.add3 as add3,
        v.city as city,
        v.pincode as pincode,
        v.person_name as person_name,
        v.telephone as telephone,
        v.email as email,
        v.udate as udate,
        v.salesman as salesman,
        v.pan_no as pan_no,
        v.cr_limit as cr_limit,
        v.cr_days as cr_days,
        v.gstno as gstno,
        v.aadhar_no as aadhar_no,
        v.sales_head as sales_head,
        v.director as director,
        v.manager as manager,
        cd.name as city_district_name,
        sm.name as state_name,
        cm.name as country_name,
        v.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.vendor v
        LEFT JOIN wms.city_district cd ON v.city_district_id = cd.id
        LEFT JOIN wms.state sm ON v.state_id = sm.id
        LEFT JOIN wms.country cm ON v.country_id = cm.id
        LEFT JOIN administration.user u ON v.lub = u.id
      WHERE
        v.is_active = true
    ) as vendors
  options:
    applyFiltering: true
    applySorting: true
    applyPagenation: true
  path:
    - queryInfo

applicableActions:
  - NEW
  - EDIT
  - DELETE

actionConfig:
  NEW:
    label: Add Vendor
    resourcePath: vendor-master
    accessTypeRequired: VENDOR-CREATE
  EDIT:
    label: Edit vendor
    resourcePath: vendor-master
    accessTypeRequired: VENDOR-UPDATE
    targetParams:
      - key: vendor_id
        as: vendor_id
  DELETE:
    label: Delete Vendor
    actionType: EXECUTE_QUERY
    accessTypeRequired: VENDOR-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        UPDATE wms.vendor
        SET is_active = false, lua = NOW()
        WHERE id = $1;
      payload:
        - vendor_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar

