    visible: true
    sortable: true
    filterable: true
    width: 120
  - name: district_name
    label: District
    visible: true
    sortable: true
    filterable: true
    width: 120
  - name: state_name
    label: State
    visible: true
    sortable: true
    filterable: true
    width: 120
  - name: country_name
    label: Country
    visible: true
    sortable: true
    filterable: true
    width: 100
  - name: pincode
    label: Pincode
    visible: true
    width: 80
  - name: person_name
    label: Contact Person
