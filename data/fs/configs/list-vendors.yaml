actionConfig:
  add-vendor:
    label: Add Vendor
    actionType: DISPLAY_FORM
    formConfig: add-vendor
    shortcut: F2
  edit-vendor:
    label: Edit
    actionType: DISPLAY_FORM
    level: ROW
    formConfig: edit-vendor
    payload:
      - id
  delete-vendor:
    label: Delete
    actionType: EXECUTE_QUERY
    level: ROW
    confirmationRequired: true
    confirmationMessage: Are you sure you want to delete this vendor?
    queryInfo:
      returnType: SCALAR
      query: |
        UPDATE wms.vendor 
        SET is_active = false, lub = $2, lua = NOW()
        WHERE id = $1
        RETURNING id;
      payload:
        - id
      contextParams:
        - current_user_id
    onSuccess: refresh
    onFailure: showErrorSnackbar
