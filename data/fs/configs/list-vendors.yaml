version: 1.0
configName: list-vendors

sections:
  - sectionType: TABLE
    sectionName: vendors
    label: Vendors

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          v.id,
          v.name as vendor_name,
          vc.name as category_name,
          v.vendor_type,
          v.add1,
          v.add2,
          v.add3,
          c.name as city_name,
          d.name as district_name,
          s.name as state_name,
          co.name as country_name,
          v.pincode,
          v.salesman,
          v.pan_no,
          v.cr_limit,
          v.cr_days,
          v.gstno,
          v.aadhar_no,
          v.is_active,
          v.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM wms.vendor v
        LEFT JOIN wms.vendor_category vc ON v.category_id = vc.id
        LEFT JOIN wms.city c ON v.city_id = c.id
        LEFT JOIN wms.district d ON v.district_id = d.id
        LEFT JOIN wms.state s ON v.state_id = s.id
        LEFT JOIN wms.country co ON v.country_id = co.id
        LEFT JOIN administration.user u ON v.lub = u.id
        WHERE v.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions:
          - 10
          - 25
          - 50
          - 100

    # Section-level actions (header + row)
    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Vendor
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: vendor-details
        mode: ADD
        payload: []
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: vendor-details
        mode: VIEW
        payload:
          - id
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: vendor-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.vendor_name}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_vendor($1, $2) as id;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false

      - name: vendor_name
        label: Vendor Name
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: category_name
        label: Category
        visible: true
        sortable: true
        filterable: true
        width: 150

      - name: vendor_type
        label: Type
        visible: true
        sortable: true
        filterable: true
        width: 100

      - name: add1
        label: Address 1
        visible: true
        width: 150

      - name: city_name
        label: City
        visible: true
        sortable: true
        filterable: true
        width: 120

      - name: district_name
        label: District
        visible: true
        sortable: true
        filterable: true
        width: 120

      - name: state_name
        label: State
        visible: true
        sortable: true
        filterable: true
        width: 120

      - name: country_name
        label: Country
        visible: true
        sortable: true
        filterable: true
        width: 100

      - name: pincode
        label: Pincode
        visible: true
        width: 80

      - name: pan_no
        label: PAN No
        visible: true
        width: 120

      - name: cr_limit
        label: Credit Limit
        visible: true
        sortable: true
        dataType: currency
        width: 120

      - name: cr_days
        label: Credit Days
        visible: true
        sortable: true
        width: 100

      - name: gstno
        label: GST No
        visible: true
        width: 150

      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 150

      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 150
