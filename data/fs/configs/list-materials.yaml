configType: LIST
version: 1.0

queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT
      m.id,
      m.name as material_name,
      m.descr,
      ic.name as category_name,
      ib.brand_name,
      u1.name as uom_pc_name,
      u2.name as uom_package_name,
      m.mrp,
      m.selling_rate,
      m.lua as last_updated_at,
      TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
    FROM wms.material m
    LEFT JOIN wms.item_category ic ON m.category_id = ic.id
    LEFT JOIN wms.item_brand ib ON m.brand_id = ib.id
    LEFT JOIN wms.uom u1 ON m.uom_pc_id = u1.id
    LEFT JOIN wms.uom u2 ON m.uom_package_id = u2.id
    LEFT JOIN administration.user u ON m.lub = u.id
    WHERE m.is_active = true
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: true
    pageSize: 50
  path: []

columns:
  - name: id
    label: ID
    visible: false
    sortable: false
  - name: material_name
    label: Material Name
    visible: true
    sortable: true
    filterable: true
    width: 200
  - name: category_name
    label: Category
    visible: true
    sortable: true
    filterable: true
    width: 150
  - name: brand_name
    label: Brand
    visible: true
    sortable: true
    filterable: true
    width: 150
  - name: uom_pc_name
    label: Base UOM
    visible: true
    width: 100
  - name: uom_package_name
    label: Package UOM
    visible: true
    width: 120
  - name: mrp
    label: MRP
    visible: true
    sortable: true
    dataType: currency
    width: 120
  - name: selling_rate
    label: Selling Rate
    visible: true
    sortable: true
    dataType: currency
    width: 120
  - name: descr
    label: Description
    visible: false
  - name: last_updated_at
    label: Last Updated
    visible: true
    sortable: true
    dataType: datetime
    format: "DD/MM/YYYY HH:mm"
    defaultSort: DESC
    width: 150
  - name: last_updated_by_name
    label: Updated By
    visible: true
    width: 150

actionConfig:
  add:
    label: Add Material
    actionType: DISPLAY_FORM
    shortcut: F2
    formConfig: add-material
    onSuccess: refresh
  edit:
    label: Edit
    actionType: DISPLAY_FORM
    shortcut: F4
    level: ROW
    formConfig: edit-material
    payload:
      - id
    onSuccess: refresh
  delete:
    label: Delete
    actionType: EXECUTE_QUERY
    shortcut: F8
    level: ROW
    confirmationRequired: true
    confirmationMessage: "Are you sure you want to delete '${row.material_name}'?"
    queryInfo:
      returnType: SCALAR
      query: SELECT wms.delete_material($1, $2) as id;
      payload:
        - id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - delete
    onSuccess: refresh
    onFailure: showErrorSnackbar
