version: 1.0
configName: list-materials

sections:
  - sectionType: TABLE
    sectionName: materials
    label: Materials

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          m.id,
          m.name as material_name,
          m.descr,
          ic.name as category_name,
          ib.brand_name,
          m.uom_pc_id,
          u1.name as uom_pc_name,
          m.uom_package_id,
          u2.name as uom_package_name,
          m.mrp,
          m.selling_rate,
          COALESCE(uc.no_of_pcs, 1) as conversion_factor,
          m.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM wms.material m
        LEFT JOIN wms.item_category ic ON m.category_id = ic.id
        LEFT JOIN wms.item_brand ib ON m.brand_id = ib.id
        LEFT JOIN wms.uom u1 ON m.uom_pc_id = u1.id
        LEFT JOIN wms.uom u2 ON m.uom_package_id = u2.id
        LEFT JOIN wms.uom_conversion uc ON m.uom_pc_id = uc.uom_id_each AND m.uom_package_id = uc.uom_id_case
        LEFT JOIN administration.user u ON m.lub = u.id
        WHERE m.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50

    # Section-level actions (header + row)
    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Material
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: material-details
        mode: ADD
        payload: []
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: material-details
        mode: VIEW
        payload:
          - id
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: material-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.material_name}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_material($1, $2) as id;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false

      - name: material_name
        label: Material Name
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: category_name
        label: Category
        visible: true
        sortable: true
        filterable: true
        width: 150

      - name: brand_name
        label: Brand
        visible: true
        sortable: true
        filterable: true
        width: 150

      - name: uom_pc_name
        label: Base UOM
        visible: true
        width: 100

      - name: uom_package_name
        label: Package UOM
        visible: true
        width: 120

      - name: mrp
        label: MRP
        visible: true
        sortable: true
        dataType: currency
        width: 120

      - name: selling_rate
        label: Selling Rate
        visible: true
        sortable: true
        dataType: currency
        width: 120

      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 150

      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 150
