queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        m.id as material_id,
        m.name as material_name,
        m.descr as descr,
        ib.name as brand_name,
        um.uom_name as uom_pc,
        um.uom_name as uom_package,
        m.pc_in_package,
        m.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) AS last_updated_by_name
      FROM
        wms.material m
        LEFT JOIN wms.item_brand ib ON m.brand_id = ib.id
        LEFT JOIN wms.uom um ON m.uom_pc_id = um.id
        LEFT JOIN wms.uom um ON m.uom_package_id = um.id
        LEFT JOIN administration.user u ON m.lub = u.id
      WHERE
        m.is_active = true
    ) as materials
  options:
    applyFiltering: true
    applySorting: true
    applyPagenation: true
  path:
    - queryInfo

applicableActions:
  - NEW
  - EDIT
  - DELETE

actionConfig:
  NEW:
    label: Add Material
    resourcePath: material-master
    accessTypeRequired: MATERIAL-CREATE
  EDIT:
    label: Edit Material
    resourcePath: material-master
    accessTypeRequired: MATERIAL-UPDATE
    targetParams:
      - key: material_id
        as: material_id
  DELETE:
    label: Delete Material
    actionType: EXECUTE_QUERY
    accessTypeRequired: MATERIAL-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        SELECT wms.delete_material($1, $2);
      payload:
        - material_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar

columns:
  - name: material_id
    label: ID
    visible: false
  - name: material_name
    label: Material Name
    visible: true
  - name: descr
    label: Description
    visible: true
  - name: brand_name
    label: Brand
    visible: true
  - name: uom_pc
    label: UOM (Per Unit)
    visible: true
  - name: uom_package
    label: UOM (Package)
    visible: true
  - name: pc_in_package
    label: Units in Package
    visible: true
  - name: lua
    label: Last Updated At
    visible: true
  - name: last_updated_by_name
    label: Last Updated By
    visible: true
