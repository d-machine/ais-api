version: 1.0
configName: list-parties

sections:
  - sectionType: TABLE
    sectionName: parties
    label: Parties

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          p.id,
          p.name as party_name,
          pc.name as category_name,
          p.party_type,
          p.add1,
          p.add2,
          p.add3,
          c.name as city_name,
          d.name as district_name,
          s.name as state_name,
          co.name as country_name,
          p.pincode,
          p.person_name,
          p.telephone,
          p.email,
          p.salesman,
          p.pan_no,
          p.cr_limit,
          p.cr_days,
          p.gstno,
          p.aadhar_no,
          p.sales_head,
          p.director,
          p.manager,
          p.is_active,
          p.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM wms.party p
        LEFT JOIN wms.party_category pc ON p.category_id = pc.id
        LEFT JOIN wms.city c ON p.city_id = c.id
        LEFT JOIN wms.district d ON p.district_id = d.id
        LEFT JOIN wms.state s ON p.state_id = s.id
        LEFT JOIN wms.country co ON p.country_id = co.id
        LEFT JOIN administration.user u ON p.lub = u.id
        WHERE p.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions:
          - 10
          - 25
          - 50
          - 100

    # Section-level actions (header + row)
    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Party
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: party-details
        mode: ADD
        payload: []
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: party-details
        mode: VIEW
        payload:
          - id
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: party-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.party_name}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: |
            UPDATE wms.party 
            SET is_active = false, lub = $2, lua = NOW()
            WHERE id = $1
            RETURNING id;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false

      - name: party_name
        label: Party Name
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: category_name
        label: Category
        visible: true
        sortable: true
        filterable: true
        width: 150

      - name: party_type
        label: Type
        visible: true
        sortable: true
        filterable: true
        width: 100

      - name: add1
        label: Address 1
        visible: true
        width: 150

      - name: city_name
        label: City
        visible: true
        sortable: true
        filterable: true
        width: 120

      - name: district_name
        label: District
        visible: true
        sortable: true
        filterable: true
        width: 120

      - name: state_name
        label: State
        visible: true
        sortable: true
        filterable: true
        width: 120

      - name: country_name
        label: Country
        visible: true
        sortable: true
        filterable: true
        width: 100

      - name: pincode
        label: Pincode
        visible: true
        width: 80

      - name: person_name
        label: Contact Person
        visible: true
        width: 150

      - name: telephone
        label: Telephone
        visible: true
        width: 120

      - name: email
        label: Email
        visible: true
        width: 180

      - name: pan_no
        label: PAN No
        visible: true
        width: 120

      - name: cr_limit
        label: Credit Limit
        visible: true
        sortable: true
        dataType: currency
        width: 120

      - name: cr_days
        label: Credit Days
        visible: true
        sortable: true
        width: 100

      - name: gstno
        label: GST No
        visible: true
        width: 150

      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 150

      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 150
