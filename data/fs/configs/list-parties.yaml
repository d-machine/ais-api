queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        p.id as party_id,
        p.party_type as party_type,
        p.name as party_name,
        p.add1 as add1,
        p.add2 as add2,
        p.add3 as add3,
        p.city as city,
        p.pincode as pincode,
        p.person_name as person_name,
        p.telephone as telephone,
        p.email as email,
        p.udate as udate,
        p.salesman as salesman,
        p.pan_no as pan_no,
        p.cr_limit as cr_limit,
        p.cr_days as cr_days,
        p.gstno as gstno,
        p.aadhar_no as aadhar_no,
        p.sales_head as sales_head,
        p.director as director,
        p.manager as manager,
        cd.id as city_district_id,
        cd.name as city_district_name,
        sm.id as state_id,
        sm.name as state_name,
        cm.id as country_id,
        cm.name as country_name,
        p.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.party p
        LEFT JOIN wms.city_district cd ON p.city_district_id = cd.id
        LEFT JOIN wms.state sm ON p.state_id = sm.id
        LEFT JOIN wms.country cm ON p.country_id = cm.id
        LEFT JOIN administration.user u ON p.lub = u.id
      WHERE
        p.is_active = true
    ) as parties
  options:
    applyFiltering: true
    applySorting: true
    applyPagenation: true   
  path:
    - queryInfo
applicableActions:
  - add
  - edit
  - delete
actionConfig:
  add:
    label: Add Party
    actionType: DISPLAY_FORM
    formConfig: add-party
    onSuccess: refresh
    accessTypeRequired: 7-ADD 
  edit:
    label: Edit Party
    actionType: DISPLAY_FORM
    formConfig: add-party
    accessTypeRequired: 7-EDIT
    payload:
      - party_id
    onSuccess: refresh
  delete:
    label: Delete Party
    actionType: EXECUTE_QUERY
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        SELECT wms.delete_party($1, $2) as id;
      payload:
        - party_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar

