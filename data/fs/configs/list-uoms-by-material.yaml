configType: LIST
version: 1.0
queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT
      u.id,
      u.name as uom_name,
      m.id as material_id
    FROM wms.uom u
    JOIN wms.material m ON (m.uom_pc_id = u.id OR m.uom_package_id = u.id)
    WHERE u.is_active = true
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: false
  path: []

columns:
  - name: id
    label: ID
    visible: false
  - name: uom_name
    label: UOM
    visible: true
  - name: material_id
    label: Material ID
    visible: false
