version: 1.0
configName: dispatch-confirm-pick
title: Confirm Pick

applicableActions:
  ADD: []

actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CLOSE:
    visible: false
    closeAction: CLOSE

sections:
  - sectionType: FIELDS
    sectionName: confirm_pick
    label: Pick Details
    applicableActions:
      ADD:
        - SAVE
        - CANCEL

    actionConfig:
      SAVE:
        label: Confirm Pick
        icon: Check
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SINGLE_ROW
          query: SELECT wms.save_dispatch_pick($1, $2, $3, $4, $5, $6, $7) as id
          payload:
            - _context.dispatch_id
            - _context.material_id
            - _context.rack_id
            - _context.expiry_dt
            - _context.batch_no
            - confirm_pick.qty
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar
      CANCEL:
        label: Cancel
        icon: X
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

    rows:
      - columns:
          - field: material_name
            span: 6
          - field: rack_code
            span: 6
      - columns:
          - field: expiry_dt
            span: 6
          - field: batch_no
            span: 6
      - columns:
          - field: planned_qty
            span: 6
          - field: qty
            span: 6

    fields:
      - name: dispatch_id
        type: NUMBER
        visible: false
      - name: material_id
        type: NUMBER
        visible: false
      - name: rack_id
        type: NUMBER
        visible: false
      - name: material_name
        label: Material
        type: TEXT
        readonly: true
      - name: rack_code
        label: Rack
        type: TEXT
        readonly: true
      - name: expiry_dt
        label: Expiry Date
        type: DATE
        readonly: true
      - name: batch_no
        label: Batch No
        type: TEXT
        readonly: true
      - name: planned_qty
        label: Planned Qty
        type: NUMBER
        readonly: true
      - name: qty
        label: Qty to Pick
        type: NUMBER
        required: true
