configType: LIST
version: 1.0

queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        t.id as id,
        t.name as transport_name,
        t.descr as descr,
        t.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.transport t
        LEFT JOIN administration.user u ON t.lub = u.id
      WHERE
        t.is_active = true
    ) as transports
  options:
    applyAccessLevelRestrictions: false
    applyFiltering: true
    applySorting: true
    applyPagination: true
    pageSize: 50
    pageSizeOptions: [10, 25, 50, 100]
    onSuccess: refresh
    onFailure: showErrorPage
  path: []

applicableActions:
  - add
  - edit
  - delete

actionConfig:
  add:
    label: Add Transport
    actionType: DISPLAY_FORM
    formConfig: add-transport
    onSuccess: refresh
    accessTypeRequired: 7-ADD

  edit:
    label: Edit Transport
    actionType: DISPLAY_FORM
    formConfig: edit-transport
    level: ROW
    accessTypeRequired: 7-EDIT
    payload:
      - id
    onSuccess: refresh

  delete:
    label: Delete Transport
    actionType: EXECUTE_QUERY
    level: ROW
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SINGLE_ROW
      query: SELECT wms.delete_transport($1, $2) as id;
      payload:
        - id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refresh
    onFailure: showErrorSnackbar

columns:
  - name: id
    label: ID
    visible: false
  - name: transport_name
    label: Transport Name
    visible: true
    sortable: true
    filterable: true
    width: 200
  - name: descr
    label: Description
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
    dataType: datetime
    format: "DD/MM/YYYY HH:mm"
    sortable: true
    defaultSort: DESC
  - name: last_updated_by_name
    label: Updated By
    visible: true