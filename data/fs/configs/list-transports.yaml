actionType: EXECUTE_QUERY
queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        t.id as transport_id,
        t.name as transport_name,
        t.descr as descr,
        t.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.transport t
        LEFT JOIN administration.user u ON t.lub = u.id
      WHERE
        t.is_active = true
    ) as transports
  options:
    applyAccessLevelRestrictions: false
    applyFiltering: true
    applySorting: true
    applyPagenation: true
    onSuccess: refresh
    onFailure: showErrorPage

applicableActions:
  - add
  - edit
  - delete

actionConfig:
  add:
    label: Add Transport
    actionType: DISPLAY_FORM
    formConfig: add-transport
    onSuccess: refresh
    accessTypeRequired: 7-ADD

  edit:
    label: Edit Transport
    actionType: DISPLAY_FORM
    formConfig: add-transport
    accessTypeRequired: 7-EDIT
    payload:
      - transport_id
    onSuccess: refresh

  delete:
    label: Delete Transport
    actionType: EXECUTE_QUERY
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SINGLE_ROW
      query: SELECT wms.delete_transport($1, $2) as id;
      payload:
        - transport_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refresh
    onFailure: showErrorSnackbar

columns:
  - name: transport_id
    label: ID
    visible: false
  - name: transport_name
    label: Transport Name
    visible: true
  - name: descr
    label: Descr
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
  - name: last_updated_by_name
    label: Last Updated By
    visible: true