version: 1.0
configName: list-transports

sections:
  - sectionType: TABLE
    sectionName: transports
    label: Transports
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          t.id, t.name as transport_name, t.descr,
          t.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM wms.transport t
        LEFT JOIN administration.user u ON t.lub = u.id
        WHERE t.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions:
          - 10
          - 25
          - 50
          - 100

    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Transport
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: transport-details
        mode: ADD
        payload: []
        onSuccess: refresh
      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: transport-details
        mode: VIEW
        payload:
          - id
      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: transport-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.transport_name}'?"
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_transport($1, $2) as id;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false

      - name: transport_name
        label: Transport Name
        visible: true
        sortable: true
        filterable: true
        width: 250

      - name: descr
        label: Description
        visible: true

      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 150

      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 150
