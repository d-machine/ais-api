version: 1.0
configName: city-district-details

# Form-level actions (global)
applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE
actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard Changes
      EDIT: Discard Changes
  CLOSE:
    visible: true
    label:
      VIEW: Close

sections:
  # Section 1: City-District Details (FIELDS)
  - sectionType: FIELDS
    sectionName: city_district_details
    label: City-District Mapping

    # Section-level data fetching
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          cd.id,
          cd.state_id,
          s.name as state_name,
          cd.city_id,
          c.name as city_name,
          cd.district_id,
          d.name as district_name,
          cd.descr
        FROM
          wms.city_district cd
          LEFT JOIN wms.state s ON cd.state_id = s.id
          LEFT JOIN wms.city c ON cd.city_id = c.id
          LEFT JOIN wms.district d ON cd.district_id = d.id
        WHERE
          cd.id = $1
      payload:
        - _context.id # Explicit: from initial context
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    # Section-level actions
    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Create Mapping
          EDIT: Update Mapping
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query:
            ADD: |
              SELECT wms.insert_city_district($1, $2, $3, $4, $5) as id;
            EDIT: |
              SELECT wms.update_city_district($1, $2, $3, $4, $5, $6) as id;
          payload:
            ADD:
              - city_district_details.city_id
              - city_district_details.district_id
              - city_district_details.state_id
              - city_district_details.descr
            EDIT:
              - _context.id # Mapping ID
              - city_district_details.city_id
              - city_district_details.district_id
              - city_district_details.state_id
              - city_district_details.descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar

      CANCEL:
        label: Discard Changes
        icon: ClipboardX
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    # Row-based layout
    rows:
      - columns:
          - field: state_id
            span: 4
          - field: city_id
            span: 4
          - field: district_id
            span: 4
      - columns:
          - field: descr
            span: 12

    # Field definitions
    fields:
      - name: state_id
        label: State
        type: SELECT
        readonly:
          - VIEW
        required: true
        multi: false
        selectConfig:
          resource: list-states
          displayField: state_name
          selectHandler: converter
          currentSelection:
            - key: state_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: state_id
            - key: state_name
              as: state_name

      - name: city_id
        label: City
        type: SELECT
        readonly:
          - VIEW
        required: true
        multi: false
        selectConfig:
          resource: list-cities
          displayField: city_name
          selectHandler: converter
          currentSelection:
            - key: city_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: city_id
            - key: city_name
              as: city_name

      - name: district_id
        label: District
        type: SELECT
        readonly:
          - VIEW
        required: true
        multi: false
        selectConfig:
          resource: list-districts
          displayField: district_name
          selectHandler: converter
          currentSelection:
            - key: district_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: district_id
            - key: district_name
              as: district_name

      - name: descr
        label: Description
        type: TEXTAREA
        readonly:
          - VIEW
