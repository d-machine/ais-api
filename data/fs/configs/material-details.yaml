version: 1.0
configName: material-details

# Form-level actions (global)
applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - CLOSE
actionConfig:
  FINISH:
    visible: true
    label: Finish
    variant: primary
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard Changes
      EDIT: Discard Changes
  CLOSE:
    visible: true
    label:
      VIEW: Close

sections:
  # Section 1: Material Details (FIELDS)
  - sectionType: FIELDS
    sectionName: material_details
    label: Material Details

    # Section-level data fetching
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          m.id,
          m.name as material_name,
          m.descr,
          m.category_id,
          ic.name as category_name,
          m.brand_id,
          ib.brand_name,
          m.hsn_id,
          h.hsn_code
        FROM wms.material m
        LEFT JOIN wms.item_category ic ON m.category_id = ic.id
        LEFT JOIN wms.item_brand ib ON m.brand_id = ib.id
        LEFT JOIN wms.hsn h ON m.hsn_id = h.id
        WHERE m.id = $1
      payload:
        - _context.id # Explicit: from initial context
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    # Section-level actions
    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Create Material
          EDIT: Update Material
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SINGLE_ROW
          query:
            ADD: |
              SELECT wms.insert_material($1, $2, $3, $4, $5, $6) as id;
            EDIT: |
              SELECT wms.update_material($1, $2, $3, $4, $5, $6, $7) as id;
          payload:
            ADD:
              - material_details.material_name
              - material_details.descr
              - material_details.category_id
              - material_details.brand_id
              - material_details.hsn_id
            EDIT:
              - _context.id
              - material_details.material_name
              - material_details.descr
              - material_details.category_id
              - material_details.brand_id
              - material_details.hsn_id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: SAVE_AND_GO_TO_NEXT
        onFailure: showErrorSnackbar

      CANCEL:
        label: Discard Changes
        icon: ClipboardX
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    # Row-based layout
    rows:
      - columns:
          - field: material_name
            span: 6
          - field: category_id
            span: 3
          - field: brand_id
            span: 3
      - columns:
          - field: hsn_id
            span: 6
          - field: descr
            span: 6

    # Field definitions
    fields:
      - name: material_name
        label: Material Name
        type: TEXT
        readonly:
          - VIEW
        required: true

      - name: category_id
        label: Category
        type: SELECT
        readonly:
          - VIEW
        required: true
        selectConfig:
          resource: list-item-categories
          displayField: category_name
          selectHandler: converter
          currentSelection:
            - key: category_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: category_id
            - key: item_category_name
              as: category_name

      - name: brand_id
        label: Brand
        type: SELECT
        readonly:
          - VIEW
        required: true
        disabled:
          condition: isEmpty
          field: category_id
        selectConfig:
          resource: list-item-brands
          displayField: brand_name
          selectHandler: converter
          currentSelection:
            - key: brand_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: brand_id
            - key: brand_name
              as: brand_name
          dependencies:
            - target:
                - category_id
              handler: filterByDependency
              required: true
              dependencyConfig:
                targetParam: category_id

      - name: hsn_id
        label: HSN Code
        type: SELECT
        readonly:
          - VIEW
        required: false
        selectConfig:
          resource: list-hsn
          displayField: hsn_code
          selectHandler: converter
          currentSelection:
            - key: hsn_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: hsn_id
            - key: hsn_code
              as: hsn_code

      - name: descr
        label: Description
        type: TEXTAREA
        readonly:
          - VIEW
        required: false

  # Section 2: EAN List (TABLE) — visible when material already exists (EDIT / VIEW)
  - sectionType: TABLE
    sectionName: ean_list
    label: EAN List

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          e.id,
          e.ean_code,
          e.label,
          u1.name AS uom_pc_name,
          u2.name AS uom_package_name,
          e.mrp,
          e.selling_rate
        FROM wms.material_ean e
        LEFT JOIN wms.uom u1 ON e.uom_pc_id = u1.id
        LEFT JOIN wms.uom u2 ON e.uom_package_id = u2.id
        WHERE e.material_id = $1 AND e.is_active = true
      payload:
        - material_details.id
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 1
      options:
        applyFiltering: false
        applySorting: false
        applyPagination: false

    applicableActions:
      ADD:
        - ADD
        - EDIT
        - VIEW
        - DELETE
      EDIT:
        - ADD
        - EDIT
        - VIEW
        - DELETE
      VIEW:
        - VIEW

    actionConfig:
      ADD:
        label: Add EAN
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        formConfig: material-ean-details
        mode: ADD
        payload:
          - key: id
            as: id
        onSuccess: refresh

      VIEW:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        formConfig: material-ean-details
        mode: VIEW
        payload:
          - id

      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        formConfig: material-ean-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh

      DELETE:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete EAN '${row.ean_code}'?"
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_material_ean($1, $2) as id;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 1
            - actionConfig
            - DELETE
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false

      - name: ean_code
        label: EAN Code
        visible: true
        width: 150

      - name: label
        label: Label
        visible: true
        width: 200

      - name: uom_pc_name
        label: Base UOM
        visible: true
        width: 100

      - name: uom_package_name
        label: Package UOM
        visible: true
        width: 120

      - name: mrp
        label: MRP
        visible: true
        dataType: currency
        width: 100

      - name: selling_rate
        label: Selling Rate
        visible: true
        dataType: currency
        width: 120
