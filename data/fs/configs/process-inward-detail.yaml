configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Inward Item Detail
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT 
          CASE WHEN $1 > 0 THEN d.id ELSE 0 END as id,
          CASE WHEN $1 > 0 THEN d.material_id ELSE pod.item_id END as item_id,
          m.name as item_name,
          CASE WHEN $1 > 0 THEN d.po_detail_id ELSE pod.id END as po_detail_id,
          pod.eqty as po_eqty,
          /* Fetch UOMs and Conversion Factors */
          m.uom_pc_id as euom,
        - id
        - row_type
        - po_detail_id
      path:
        - sections
        - 0
    
    applicableActions:
      - SAVE
      - CANCEL
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Cancel

    fields:
      - name: id
        label: ID
        type: NUMBER
        visible: false
      
      - name: header_id
        label: Header ID
        type: NUMBER
        visible: false
        required: true
      
      # Hidden fields
      - name: conversion_factor
        label: Conversion Factor
        type: NUMBER
        visible: false
      - name: euom
        label: Base UOM ID
        type: NUMBER
        visible: false
      - name: puom
        label: Package UOM ID
        type: NUMBER
        visible: false
      - name: po_detail_id
        label: PO Detail ID
        type: NUMBER
        visible: false

      - name: item_id
        label: Item
        type: SELECT
        required: true
        readonly: true
        selectConfig:
          resource: list-materials
          displayField: item_name
          currentSelection:
            - key: item_id
              as: item_id
      
      - name: po_eqty
        label: PO Qty (Each)
        type: NUMBER
        readonly: true
      
      - name: quom
        label: Quantity UOM
        type: SELECT
        required: true
        selectConfig:
          resource: list-uoms-by-material
          labelField: uom_name
          displayField: uom_name
          selectHandler: converter
          currentSelection:
            - key: quom
              as: quom
          selectParser: converter
          fields_to_extract:
            - key: id
              as: quom
            - key: uom_name
              as: uom_name
        dependencies:
          - target: [item_id]
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: material_id

      - name: eqty
        label: Quantity (Each)
        type: NUMBER
        required: true
        dependencies:
          - target: [quom]
            handler: toggleReadonly
            dependencyConfig:
              compareWithField: puom
          - target: [pqty, conversion_factor, quom]
            handler: calculateValue
            dependencyConfig:
              operation: MULTIPLY
              operands: [pqty, conversion_factor]
              condition:
                field: quom
                compareWithField: puom

      - name: pqty
        label: Quantity (Pack)
        type: NUMBER
        required: true
        dependencies:
          - target: [quom]
            handler: toggleReadonly
            dependencyConfig:
              compareWithField: euom
          - target: [eqty, conversion_factor, quom]
            handler: calculateValue
            dependencyConfig:
              operation: DIVIDE
              operands: [eqty, conversion_factor]
              condition:
                field: quom
                compareWithField: euom
      
      - name: expiry_dt
        label: Expiry Date
        type: DATE
        required: false

      - name: remarks
        label: Remarks
        type: TEXTAREA
