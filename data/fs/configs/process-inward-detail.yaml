configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Inward Item Detail
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT 
          COALESCE($2, 0) as id,
          $1 as header_id,
          CASE WHEN $2 > 0 THEN d.material_id ELSE pod.item_id END as item_id,
          m.name as item_name,
          CASE WHEN $2 > 0 THEN d.po_detail_id ELSE pod.id END as po_detail_id,
          pod.eqty as po_eqty,
          CASE WHEN $2 > 0 THEN d.euom ELSE m.uom_pc_id END as euom,
          u_each.name as euom_name,
          CASE WHEN $2 > 0 THEN d.puom ELSE m.uom_package_id END as puom,
          u_pkg.name as puom_name,
          CASE WHEN $2 > 0 THEN d.quom ELSE NULL END as quom,
          CASE WHEN $2 > 0 THEN u_quom.name ELSE NULL END as quom_name,
          CASE WHEN $2 > 0 THEN d.eqty ELSE 0 END as eqty,
          CASE WHEN $2 > 0 THEN d.pqty ELSE 0 END as pqty,
          CASE WHEN $2 > 0 THEN d.expiry_dt ELSE NULL END as expiry_dt,
          CASE WHEN $2 > 0 THEN d.batch_no ELSE '' END as batch_no,
          CASE WHEN $2 > 0 THEN d.remarks ELSE '' END as remarks,
          COALESCE(uc.no_of_pcs, 1) as conversion_factor
        FROM wms.purchase_order_details pod
        JOIN wms.material m ON pod.item_id = m.id
        LEFT JOIN wms.inward_details d ON d.po_detail_id = pod.id AND d.id = COALESCE($2, 0)
        LEFT JOIN wms.uom u_each ON CASE WHEN $2 > 0 THEN d.euom ELSE m.uom_pc_id END = u_each.id
        LEFT JOIN wms.uom u_pkg ON CASE WHEN $2 > 0 THEN d.puom ELSE m.uom_package_id END = u_pkg.id
        LEFT JOIN wms.uom u_quom ON d.quom = u_quom.id
        LEFT JOIN wms.uom_conversion uc ON m.uom_pc_id = uc.uom_id_each AND m.uom_package_id = uc.uom_id_case
        WHERE pod.id = $3
      payload:
        - header_id
        - inward_detail_id
        - po_detail_id
      path:
        - sections
        - 0
    
    applicableActions:
      - SAVE
      - CANCEL
    
    actionConfig:
      SAVE:
        label: Save Details
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: |
            SELECT CASE 
              WHEN $1 > 0 THEN wms.update_inward_details($1, $2, $3, $4, $5, $6, $7, $8, $9, 0, 0, $10, $11, $12, $13)
              ELSE wms.insert_inward_details($2, $3, $4, $5, $6, $7, $8, $9, 0, 0, $10, $11, $12, $13)
            END as id;
          payload:
            - id
            - header_id
            - item_id
            - po_detail_id
            - quom
            - euom
            - puom
            - eqty
            - pqty
            - expiry_dt
            - batch_no
            - remarks
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Cancel

    rows:
      - columns:
          - field: item_id
            span: 12
      - columns:
          - field: euom
            span: 6
          - field: puom
            span: 6
      - columns:
          - field: po_eqty
            span: 4
          - field: quom
            span: 4
          - field: eqty
            span: 2
          - field: pqty
            span: 2
      - columns:
          - field: expiry_dt
            span: 6
          - field: batch_no
            span: 6
      - columns:
          - field: remarks
            span: 12

    fields:
      - name: id
        label: ID
        type: NUMBER
        visible: false
      
      - name: header_id
        label: Header ID
        type: NUMBER
        visible: false
        required: true
      
      # Hidden fields
      - name: conversion_factor
        label: Conversion Factor
        type: NUMBER
        visible: false
      - name: po_detail_id
        label: PO Detail ID
        type: NUMBER
        visible: false

      - name: item_id
        label: Item
        type: SELECT
        required: true
        readonly: true
        selectConfig:
          resource: list-materials
          displayField: item_name
          currentSelection:
            - key: item_id
              as: id
      
      - name: euom
        label: Base UOM
        type: SELECT
        required: true
        selectConfig:
          resource: list-uoms-by-material
          displayField: euom_name
          selectHandler: converter
          currentSelection:
            - key: euom
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: euom
            - key: uom_name
              as: euom_name
        dependencies:
          - target: [item_id]
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: material_id
      
      - name: puom
        label: Package UOM
        type: SELECT
        required: true
        selectConfig:
          resource: list-uoms-by-material
          displayField: puom_name
          selectHandler: converter
          currentSelection:
            - key: puom
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: puom
            - key: uom_name
              as: puom_name
        dependencies:
          - target: [item_id]
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: material_id
      
      - name: po_eqty
        label: PO Qty (Each)
        type: NUMBER
        readonly: true
      
      - name: quom
        label: Quantity UOM
        type: SELECT
        required: true
        selectConfig:
          resource: list-uoms-by-material
          displayField: quom_name
          selectHandler: converter
          currentSelection:
            - key: quom
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: quom
            - key: uom_name
              as: quom_name
        dependencies:
          - target: [item_id]
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: material_id

      - name: eqty
        label: Quantity (Each)
        type: NUMBER
        required: true
        dependencies:
          - target: [quom]
            handler: toggleReadonly
            dependencyConfig:
              compareWithField: puom
          - target: [pqty, conversion_factor, quom]
            handler: calculateValue
            dependencyConfig:
              operation: MULTIPLY
              operands: [pqty, conversion_factor]
              condition:
                field: quom
                compareWithField: puom

      - name: pqty
        label: Quantity (Pack)
        type: NUMBER
        required: true
        dependencies:
          - target: [quom]
            handler: toggleReadonly
            dependencyConfig:
              compareWithField: euom
          - target: [eqty, conversion_factor, quom]
            handler: calculateValue
            dependencyConfig:
              operation: DIVIDE
              operands: [eqty, conversion_factor]
              condition:
                field: quom
                compareWithField: euom
      
      - name: expiry_dt
        label: Expiry Date
        type: DATE
        required: false

      - name: batch_no
        label: Batch Number
        type: TEXT
        required: false
        placeholder: "Enter batch/lot number"

      - name: remarks
        label: Remarks
        type: TEXTAREA
