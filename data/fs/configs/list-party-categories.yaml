version: 1.0
configName: list-party-categories

sections:
  - sectionType: TABLE
    sectionName: party_categories
    label: Party Categories

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          pc.id,
          pc.name as category_name,
          pc.discount_percentage,
          pc.is_active,
          pc.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM wms.party_category pc
        LEFT JOIN administration.user u ON pc.lub = u.id
        WHERE pc.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions:
          - 10
          - 25
          - 50
          - 100

    # Section-level actions (header + row)
    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Category
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: party-category-details
        mode: ADD
        payload: []
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: party-category-details
        mode: VIEW
        payload:
          - id
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: party-category-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.category_name}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: |
            UPDATE wms.party_category 
            SET is_active = false, lub = $2, lua = NOW()
            WHERE id = $1
            RETURNING id;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false
      - name: category_name
        label: Category Name
        visible: true
        sortable: true
        filterable: true
        width: 250
      - name: discount_percentage
        label: Discount %
        visible: true
        sortable: true
        dataType: number
        width: 150
      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 180
      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 180
