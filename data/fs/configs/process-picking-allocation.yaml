version: 1.0
configName: process-picking-allocation
title: Material Allocation

applicableActions:
  ADD:
    - CLOSE
  VIEW:
    - CLOSE

actionConfig:
  CLOSE:
    visible: true
    closeAction: REFRESH
    label: Done
    variant: primary

sections:
  - sectionType: FIELDS
    sectionName: material_allocation
    label: Allocation Summary
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          $1::numeric as header_id,
          $2::numeric as material_id,
          m.name as material_name,
          u.name as uom_name,
          $3::numeric as total_pending_qty,
          $4 as so_detail_ids,
          (
            SELECT COALESCE(SUM(qty), 0)
            FROM wms.stock
            WHERE material_id = $2 AND is_active = true
          ) - (
            SELECT COALESCE(SUM(d.qty), 0)
            FROM wms.picking_list_details d
            JOIN wms.picking_list_header h ON d.header_id = h.id
            WHERE d.material_id = $2
              AND d.is_active = true
              AND h.status IN ('Draft', 'Picked')
          ) as quantity_in_stock,
          COALESCE(
            (SELECT SUM(qty) FROM wms.picking_list_details
             WHERE header_id = $1 AND material_id = $2 AND is_active = true),
            0
          ) as already_allocated_qty,
          ($3::numeric - COALESCE(
            (SELECT SUM(qty) FROM wms.picking_list_details
             WHERE header_id = $1 AND material_id = $2 AND is_active = true),
            0
          )) as qty_to_pick
        FROM wms.material m
        LEFT JOIN wms.uom u ON m.uom_pc_id = u.id
        WHERE m.id = $2
      payload:
        - header_id
        - material_id
        - total_pending_qty
        - so_detail_ids
      path:
        - sections
        - 0

    applicableActions:
      ADD:
        - CANCEL
      VIEW:
        - CANCEL

    actionConfig:
      CANCEL:
        label: Close
        icon: X
        variant: secondary
        actionType: NAVIGATE
        onSuccess: exitAndComplete

    rows:
      - columns:
          - field: material_name
            span: 12
      - columns:
          - field: total_pending_qty
            span: 4
          - field: already_allocated_qty
            span: 4
          - field: quantity_in_stock
            span: 4

    fields:
      - name: header_id
        type: NUMBER
        visible: false
      - name: material_id
        type: NUMBER
        visible: false
      - name: so_detail_ids
        type: TEXT
        visible: false
      - name: material_name
        label: Material
        type: TEXT
        readonly: true
      - name: total_pending_qty
        label: Total Pending
        type: NUMBER
        readonly: true
      - name: already_allocated_qty
        label: Already Allocated
        type: NUMBER
        readonly: true
      - name: quantity_in_stock
        label: Quantity in Stock
        type: NUMBER
        readonly: true
      - name: qty_to_pick
        label: Quantity to Pick
        type: NUMBER
        visible: false

  - sectionType: TABLE
    sectionName: available_stock
    label: Available Stock (FIFO/FEFO)
    applicableActions:
      ADD:
        - pick
        - unpick
      VIEW:
        - view_pick
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        WITH stock_data AS (
            SELECT
              MIN(s.id) as stock_id,
              s.rack_id,
              r.code as rack_code,
              r.name as rack_name,
              s.expiry_dt,
              s.batch_no,
              (SUM(s.qty) - COALESCE((
                  SELECT SUM(d.qty)
                  FROM wms.picking_list_details d
                  JOIN wms.picking_list_header h ON d.header_id = h.id
                  WHERE d.material_id = $2
                    AND d.rack_id = s.rack_id
                    AND (d.expiry_dt = s.expiry_dt OR (d.expiry_dt IS NULL AND s.expiry_dt IS NULL))
                    AND d.header_id != $1
                    AND h.status IN ('Draft', 'Picked')
                    AND d.is_active = true
              ), 0)) as available_qty
            FROM wms.stock s
            JOIN wms.rack r ON s.rack_id = r.id
            WHERE s.material_id = $2
              AND s.is_active = true
            GROUP BY
              s.rack_id,
              r.code,
              r.name,
              s.expiry_dt,
              s.batch_no
        ),
        fifo_calc AS (
            SELECT
              *,
              SUM(available_qty) OVER (ORDER BY expiry_dt ASC NULLS LAST, stock_id ASC) as running_total
            FROM stock_data
            WHERE available_qty > 0
        )
        SELECT
          f.*,
          COALESCE(pld.qty,
            CASE
              WHEN $3 > 0 THEN
                LEAST(f.available_qty, GREATEST(0, $3 - (f.running_total - f.available_qty)))
              ELSE 0
            END
          ) as allocated_qty,
          CASE WHEN pld.id IS NOT NULL THEN 'Picked' ELSE 'Not Picked' END as pick_status
        FROM fifo_calc f
        LEFT JOIN wms.picking_list_details pld ON
            pld.header_id = $1
            AND pld.material_id = $2
            AND pld.rack_id = f.rack_id
            AND (pld.expiry_dt = f.expiry_dt OR (pld.expiry_dt IS NULL AND f.expiry_dt IS NULL))
            AND pld.is_active = true
        ORDER BY f.expiry_dt ASC NULLS LAST, f.stock_id ASC
      payload:
        - header_id
        - material_id
        - qty_to_pick
      path:
        - sections
        - 1
      options:
        applyFiltering: false
        applySorting: false
        applyPagination: false

    columns:
      - name: rack_code
        label: Rack
        visible: true
      - name: rack_name
        label: Location
        visible: true
      - name: expiry_dt
        label: Expiry Date
        visible: true
        dataType: datetime
      - name: batch_no
        label: Batch No
        visible: true
      - name: available_qty
        label: Available
        visible: true
        align: right
        dataType: number
      - name: allocated_qty
        label: Qty to Pick
        visible: true
        align: right
        dataType: number
      - name: pick_status
        label: Status
        visible: true

    actionConfig:
      pick:
        label: Pick
        icon: Plus
        variant: primary
        level: ROW
        condition: row.pick_status === 'Not Picked'
        actionType: DISPLAY_FORM
        formConfig: process-manual-pick
        mode: ADD
        payload:
          - header_id
          - material_id
          - rack_id
          - expiry_dt
          - batch_no
          - key: allocated_qty
            as: qty
        onSuccess: refresh

      unpick:
        label: Unpick
        icon: Trash2
        variant: danger
        level: ROW
        condition: row.pick_status === 'Picked'
        actionType: EXECUTE_QUERY
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to unpick this item?"
        queryInfo:
          returnType: SCALAR
          query: |
            WITH deleted AS (
              DELETE FROM wms.picking_list_details
              WHERE header_id = $1
                AND material_id = $2
                AND rack_id = $3
                AND (expiry_dt = $4 OR (expiry_dt IS NULL AND $4 IS NULL))
                AND is_active = true
            )
            SELECT $1::numeric as id;
          payload:
            - header_id
            - material_id
            - rack_id
            - expiry_dt
          path:
            - sections
            - 1
            - actionConfig
            - unpick
        onSuccess: refresh

      view_pick:
        label: View
        icon: Eye
        variant: secondary
        level: ROW
        condition: row.pick_status === 'Picked'
        actionType: DISPLAY_FORM
        formConfig: process-manual-pick
        mode: VIEW
        payload:
          - header_id
          - material_id
          - rack_id
          - expiry_dt
          - batch_no
          - key: allocated_qty
            as: qty
