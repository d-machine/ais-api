queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        cd.id as city_district_id,
        cd.name as city_district_name,
        cm.id as city_id,
        cm.name as city_name,
        dm.id as district_id,
        dm.name as district_name,
        sm.id as state_id,
        sm.name as state_name,
        cd.descr as descr,
        cd.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) AS last_updated_by_name
      FROM
        wms.city_district cd
        LEFT JOIN wms.city cm ON cd.city_id = cm.id
        LEFT JOIN wms.district dm ON cd.district_id = dm.id
        LEFT JOIN wms.state sm ON cd.state_id = sm.id
        LEFT JOIN administration.user u ON cd.lub = u.id
      WHERE
        cd.is_active = true
    ) as city_districts
  options:
    applyFiltering: true
    applySorting: true
    applyPagenation: true
  path:
    - queryInfo

applicableActions:
  - add
  - edit
  - delete

actionConfig:
  add:
    label: Add City-district
    actionType: DISPLAY_FORM
    formConfig: add-city-district
    onSuccess: refresh
    accessTypeRequired: 7-ADD
  edit:
    label: Edit City-District
    actionType: DISPLAY_FORM
    formConfig: add-city-district
    accessTypeRequired: 7-EDIT
    payload:
      - city_district_id
    onSuccess: refresh
  delete:
    label: Delete City-District
    actionType: EXECUTE_QUERY
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        SELECT wms.delete_city_district($1, $2) as id;
      payload:
        - city_district_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar

columns:
  - name: city_district_id
    label: ID
    visible: false
  - name: city_name
    label: City Name
    visible: true
  - name: district_name
    label: District Name
    visible: true
  - name: state_name
    label: State Name
    visible: true
  - name: descr
    label: Descr
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
  - name: last_updated_by_name
    label: Last Updated By
    visible: true
