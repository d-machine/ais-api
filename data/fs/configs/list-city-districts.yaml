version: 1.0
configName: list-city-districts

sections:
  - sectionType: TABLE
    sectionName: city_districts
    label: City-District Mappings

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT * FROM (
          SELECT
            cd.id,
            cm.name as city_name,
            dm.name as district_name,
            sm.name as state_name,
            cd.descr,
            cd.lua as last_updated_at,
            TRIM(CONCAT(u.first_name, ' ', u.last_name)) AS last_updated_by_name
          FROM
            wms.city_district cd
            LEFT JOIN wms.city cm ON cd.city_id = cm.id
            LEFT JOIN wms.district dm ON cd.district_id = dm.id
            LEFT JOIN wms.state sm ON cd.state_id = sm.id
            LEFT JOIN administration.user u ON cd.lub = u.id
          WHERE
            cd.is_active = true
        ) as city_districts
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions:
          - 10
          - 25
          - 50
          - 100

    # Section-level actions (header + row)
    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Mapping
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: city-district-details
        mode: ADD
        payload: []
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: city-district-details
        mode: VIEW
        payload:
          - id
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: city-district-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete this mapping?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_city_district($1, $2) as result;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false
      - name: state_name
        label: State
        visible: true
        sortable: true
        filterable: true
        width: 150
      - name: city_name
        label: City
        visible: true
        sortable: true
        filterable: true
        width: 150
      - name: district_name
        label: District
        visible: true
        sortable: true
        filterable: true
        width: 150
      - name: descr
        label: Description
        visible: true
      - name: last_updated_at
        label: Last Updated At
        visible: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        sortable: true
        defaultSort: DESC
      - name: last_updated_by_name
        label: Updated By
        visible: true
