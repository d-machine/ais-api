configType: LIST
version: 1.0

queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        cd.id as id,
        cm.name as city_name,
        dm.name as district_name,
        sm.name as state_name,
        cd.descr,
        cd.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) AS last_updated_by_name
      FROM
        wms.city_district cd
        LEFT JOIN wms.city cm ON cd.city_id = cm.id
        LEFT JOIN wms.district dm ON cd.district_id = dm.id
        LEFT JOIN wms.state sm ON cd.state_id = sm.id
        LEFT JOIN administration.user u ON cd.lub = u.id
      WHERE
        cd.is_active = true
    ) as city_districts
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: true
    pageSize: 50
    pageSizeOptions: [10, 25, 50, 100]
    onSuccess: refresh
    onFailure: showErrorPage
  path: []

applicableActions:
  - add
  - edit
  - delete

actionConfig:
  add:
    label: Add Mapping
    actionType: DISPLAY_FORM
    shortcut: "F2"
    formConfig: add-city-district
    onSuccess: refresh
    accessTypeRequired: 7-ADD
  
  edit:
    label: Edit Mapping
    actionType: DISPLAY_FORM
    shortcut: "F4"
    level: ROW
    formConfig: edit-city-district
    payload:
      - id
    onSuccess: refresh
    accessTypeRequired: 7-EDIT

  delete:
    label: Delete Mapping
    actionType: EXECUTE_QUERY
    shortcut: "F8"
    level: ROW
    confirmationRequired: true
    confirmationMessage: "Are you sure you want to delete this mapping?"
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: SELECT wms.delete_city_district($1, $2) as id;
      payload:
        - id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - delete
    onSuccess: refresh
    onFailure: showErrorSnackbar

columns:
  - name: id
    label: ID
    visible: false
    sortable: false
  - name: state_name
    label: State
    visible: true
    sortable: true
    filterable: true
    width: 150
  - name: city_name
    label: City
    visible: true
    sortable: true
    filterable: true
    width: 150
  - name: district_name
    label: District
    visible: true
    sortable: true
    filterable: true
    width: 150
  - name: descr
    label: Description
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
    dataType: datetime
    format: "DD/MM/YYYY HH:mm"
    sortable: true
    defaultSort: DESC
  - name: last_updated_by_name
    label: Updated By
    visible: true
