configType: LIST
version: 1.0

queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        sm.id as id,
        sm.name as state_name,
        sm.code as state_code,
        sm.descr as descr,
        cm.id as country_id,
        cm.name as country_name,
        sm.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.state sm
        LEFT JOIN wms.country cm ON sm.country_id = cm.id
        LEFT JOIN administration.user u ON sm.lub = u.id
      WHERE
        sm.is_active = true
      ) as states
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: true
    pageSize: 50
    pageSizeOptions: [10, 25, 50, 100]
    selectionShortcut: "Ctrl+M"
    onSuccess: refresh
    onFailure: showErrorPage
  path: []

applicableActions:
  - add
  - edit
  - delete

actionConfig:
  add:
    label: Add State
    actionType: DISPLAY_FORM
    shortcut: "F2"
    formConfig: add-state
    onSuccess: refresh
    accessTypeRequired: 7-ADD
  edit:
    label: Edit State
    actionType: DISPLAY_FORM
    shortcut: "F4"
    level: ROW
    formConfig: edit-state
    payload:
      - id
    onSuccess: refresh
    accessTypeRequired: 7-EDIT
  delete:
    label: Delete State
    actionType: EXECUTE_QUERY
    shortcut: "F8"
    level: ROW
    confirmationRequired: true
    confirmationMessage: "Are you sure you want to delete '${row.state_name}'?"
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        SELECT wms.delete_state($1, $2) as id;
      payload:
        - id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - delete
    onSuccess: refresh
    onFailure: showErrorSnackbar

columns:
  - name: id
    label: ID
    visible: false
    sortable: false
  - name: state_name
    label: State Name
    visible: true
    sortable: true
    filterable: true
    width: 200
  - name: state_code
    label: State Code
    visible: true
    sortable: true
    width: 100
  - name: descr
    label: Description
    visible: true
  - name: country_name
    label: Country
    visible: true
    sortable: true
    width: 150
  - name: last_updated_at
    label: Last Updated At
    visible: true
    dataType: datetime
    format: "DD/MM/YYYY HH:mm"
    sortable: true
    defaultSort: DESC
  - name: last_updated_by_name
    label: Updated By
    visible: true