queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        sm.id as state_id,
        sm.name as state_name,
        sm.code as state_code,
        sm.descr as descr,
        cm.id as country_id,
        cm.name as country_name,
        sm.lua as lua,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.state sm
        LEFT JOIN wms.country cm ON sm.country_id = cm.id
        LEFT JOIN administration.user u ON sm.lub = u.id
      WHERE
        sm.is_active = true
      ) as states
  options:
    applyFiltering: true
    applySorting: true
    applyPagenation: true
  path:
    - queryInfo
applicableActions:
  - add
  - edit
  - delete
actionConfig:
  add:
    label: Add State
    actionType: DISPLAY_FORM
    formConfig: add-state
    onSuccess: refresh
    accessTypeRequired: 7-ADD
  edit:
    label: Edit State
    actionType: DISPLAY_FORM
    formConfig: add-state
    accessTypeRequired: 7-EDIT
    payload:
      - state_id
    onSuccess: refresh
  delete:
    label: Delete State
    actionType: EXECUTE_QUERY
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        SELECT wms.delete_state($1, $2) as id;
      payload:
        - state_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar

columns:
  - name: state_id
    label: ID
    visible: false
  - name: state_name
    label: State Name
    visible: true
  - name: state_code
    label: State Code
    visible: true
  - name: descr
    label: descr
    visible: true
  - name: country_name
    label: Country
    visible: true
  - name: lua
    label: Last Updated At
    visible: true
  - name: last_updated_by_name
    label: Last Updated By
    visible: true 