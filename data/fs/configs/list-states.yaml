version: 1.0

sections:
  - sectionType: TABLE
    sectionName: states

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          s.id,
          s.country_id,
          c.name as country_name,
          s.name as state_name,
          s.code as state_code,
          s.descr,
          s.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM
          wms.state s
          LEFT JOIN wms.country c ON s.country_id = c.id
          LEFT JOIN administration.user u ON s.lub = u.id
        WHERE s.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions: [10, 25, 50, 100]

    applicableActions:
      - add
      - view
      - edit
      - delete

    actionConfig:
      add:
        label: Add State
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: state-details
        mode: ADD
        payload: [] # No initial context for standalone add
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: state-details
        mode: VIEW
        payload:
          - id # From row: state ID
          - country_id # From row: country ID
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: state-details
        mode: EDIT
        payload:
          - id # From row: state ID
          - country_id # From row: country ID
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.state_name}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_state($1, $2) as result;
          payload:
            - id # From row: state ID
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false

      - name: country_id
        label: Country ID
        visible: false

      - name: country_name
        label: Country
        visible: true
        sortable: true
        filterable: true
        width: 150

      - name: state_name
        label: State Name
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: state_code
        label: State Code
        visible: true
        sortable: true
        width: 100

      - name: descr
        label: Description
        visible: true

      - name: last_updated_at
        label: Last Updated At
        visible: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        sortable: true
        defaultSort: DESC

      - name: last_updated_by_name
        label: Updated By
        visible: true
