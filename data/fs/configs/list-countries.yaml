version: 1.0
configName: list-countries

sections:
  - sectionType: TABLE
    sectionName: countries

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          cm.id,
          cm.name as country_name,
          cm.code as country_code,
          cm.descr as descr,
          cm.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM
          wms.country cm
          LEFT JOIN administration.user u ON cm.lub = u.id
        WHERE cm.is_active = true
      path:
        - sections
        - 0
      options:
        applyAccessLevelRestrictions: false
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions: [10, 25, 50, 100]
        selectionShortcut: "Ctrl+M"
        onSuccess: refresh
        onFailure: showErrorSnackbar

    # Section-level actions (header + row)
    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Country
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: country-details
        mode: ADD
        payload: [] # No initial context for ADD
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: country-details
        mode: VIEW
        payload:
          - id # From row: country ID
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: country-details
        mode: EDIT
        payload:
          - id # From row: country ID
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.country_name}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_country($1, $2) as id;
          payload:
            - id # From row: country ID
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    # Column definitions
    columns:
      - name: id
        label: ID
        visible: false
        sortable: false

      - name: country_name
        label: Country Name
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: country_code
        label: Country Code
        visible: true
        sortable: true
        width: 100

      - name: descr
        label: Description
        visible: true

      - name: last_updated_at
        label: Last Updated At
        visible: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        sortable: true
        defaultSort: DESC

      - name: last_updated_by_name
        label: Updated By
        visible: true
