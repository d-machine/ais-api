configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: State Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          sm.id as state_id,
          sm.name as state_name,
          sm.code as state_code,
          sm.country_id as country_id,
          cm.name as country_name,
          sm.descr as descr
        FROM
          wms.state sm
          LEFT JOIN wms.country cm ON sm.country_id = cm.id
        WHERE
          sm.id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Update State
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: |
            SELECT wms.update_state($1, $2, $3, $4, $5, $6) as id;
          payload:
            - state_id
            - state_name
            - state_code
            - descr
            - country_id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    # Row-based layout
    rows:
      - columns:
          - field: state_name
            span: 6
          - field: state_code
            span: 6
      - columns:
          - field: country_id
            span: 12
      - columns:
          - field: descr
            span: 12
    
    # Field definitions
    fields:
      - name: state_name
        label: State Name
        type: TEXT
        required: true
      - name: state_code
        label: State Code
        type: TEXT
        required: true
      - name: country_id
        label: Country
        type: SELECT
        required: true
        multi: false
        selectConfig:
          resource: list-countries
          displayField: country_name
          selectHandler: converter
          currentSelection:
            - key: country_id
              as: country_id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: country_id
            - key: country_name
              as: country_name
      - name: descr
        label: Description
        type: TEXTAREA
