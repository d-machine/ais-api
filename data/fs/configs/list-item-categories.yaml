configType: LIST
version: 1.0

queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        icm.id,
        icm.name as item_category_name,
        icm.descr,
        icm.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.item_category icm
        LEFT JOIN administration.user u ON icm.lub = u.id
      WHERE 
        icm.is_active = true
    ) as item_categories
  options:
    applyAccessLevelRestrictions: false
    applyFiltering: true
    applySorting: true
    applyPagination: true
    pageSize: 50
    pageSizeOptions: [10, 25, 50, 100]
    onSuccess: refresh
    onFailure: showErrorPage
  path: []

applicableActions:
  - add
  - edit
  - delete

actionConfig:
  add:
    label: Add Category
    actionType: DISPLAY_FORM
    shortcut: "F2"
    formConfig: add-item-category
    onSuccess: refresh
    accessTypeRequired: 7-ADD
  
  edit:
    label: Edit Category
    actionType: DISPLAY_FORM
    shortcut: "F4"
    level: ROW
    formConfig: edit-item-category
    payload:
      - id
    onSuccess: refresh
    accessTypeRequired: 7-EDIT

  delete:
    label: Delete Category
    actionType: EXECUTE_QUERY
    shortcut: "F8"
    level: ROW
    confirmationRequired: true
    confirmationMessage: "Are you sure you want to delete '${row.item_category_name}'?"
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: SELECT wms.delete_item_category($1, $2) as id;
      payload:
        - id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - delete
    onSuccess: refresh
    onFailure: showErrorSnackbar

columns:
  - name: id
    label: ID
    visible: false
    sortable: false
  - name: item_category_name
    label: Category Name
    visible: true
    sortable: true
    filterable: true
    width: 300
  - name: descr
    label: Description
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
    dataType: datetime
    format: "DD/MM/YYYY HH:mm"
    sortable: true
    defaultSort: DESC
  - name: last_updated_by_name
    label: Updated By
    visible: true
