actionType: EXECUTE_QUERY
queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        icm.id as category_id,
        icm.name as category_name,
        icm.descr as descr,
        icm.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.item_category icm
        LEFT JOIN administration.user u ON icm.lub = u.id
      WHERE 
        icm.is_active = true
    ) as item_categories
  options:
    applyAccessLevelRestrictions: false
    applyFiltering: true
    applysorting: true
    applyPagenation: true
    onSuccess: refresh
    onFailure: showErrorPage
applicableActions:
  - add
  - edit
  - delete
actionConfig:
  add:
    label: Add Item Category
    actionType: DISPLAY_FORM
    formConfig: add-category
    onSuccess: refresh
    accessTypeRequired: 7-ADD
  
  edit:
    label: Edit Item Category
    actionType: DISPLAY_FORM
    formConfig: add-category
    accessTypeRequired: 7-EDIT
    payload:
      - item_category_id
    onSuccess: refresh

  delete:
    label: Delete Item Category
    actionType: EXECUTE_QUERY
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SINGLE_ROW
      query: SELECT wms.delete_item_category($1,$2) as id;
      payload:
        - category_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refresh
    onFailure: showErrorSnackbar

columns:
  - name: category_id
    label: ID
    visible: false
  - name: category_name
    label: Item Category Name
    visible: true
  - name: descr
    label: Descr
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
  - name: last_updated_by_name
    label: Last Updated BY
    visible: true
