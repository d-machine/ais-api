version: 1.0
configName: list-item-categories

sections:
  - sectionType: TABLE
    sectionName: categories
    label: Categories

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          icm.id,
          icm.name as item_category_name,
          icm.descr,
          icm.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM
          wms.item_category icm
          LEFT JOIN administration.user u ON icm.lub = u.id
        WHERE
          icm.is_active = true
      path:
        - sections
        - 0
      options:
        applyAccessLevelRestrictions: false
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions:
          - 10
          - 25
          - 50
          - 100

    # Section-level actions (header + row)
    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Category
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: item-category-details
        mode: ADD
        payload: []
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: item-category-details
        mode: VIEW
        payload:
          - id
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: item-category-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete Category
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.item_category_name}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_item_category($1, $2) as id;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false

      - name: item_category_name
        label: Category Name
        visible: true
        sortable: true
        filterable: true
        width: 300

      - name: descr
        label: Description
        visible: true

      - name: last_updated_at
        label: Last Updated At
        visible: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        sortable: true
        defaultSort: DESC

      - name: last_updated_by_name
        label: Updated By
        visible: true
