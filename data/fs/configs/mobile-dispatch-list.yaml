version: 1.0
configName: mobile-dispatch-list

sections:
  - sectionType: TABLE
    sectionName: picker_dispatches
    label: My Dispatches
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          dh.id,
          dh.entry_no,
          dh.entry_dt,
          p.name as party_name,
          plh.entry_no as pl_entry_no,
          plh.pick_dt,
          (SELECT COUNT(*) FROM wms.picking_list_details pld
           WHERE pld.header_id = plh.id AND pld.is_active = true) as total_items,
          (SELECT COUNT(*) FROM wms.dispatch_details dd
           WHERE dd.header_id = dh.id AND dd.is_active = true) as picked_items
        FROM wms.dispatch_header dh
        JOIN wms.party p ON dh.party_id = p.id
        JOIN wms.picking_list_header plh ON plh.id = dh.pl_ids::int
        WHERE dh.status = 0
          AND dh.is_active = true
          AND plh.picker_id = $1
        ORDER BY plh.pick_dt ASC, dh.entry_dt DESC
      contextParams:
        - current_user_id
      path:
        - sections
        - 0

    applicableActions:
      VIEW:
        - pick_items

    actionConfig:
      pick_items:
        label: Pick Items
        icon: Package
        variant: primary
        level: ROW
        actionType: DISPLAY_FORM
        formConfig: dispatch-pick-list
        mode: EDIT
        payload:
          - id
        onSuccess: refresh

    columns:
      - name: id
        label: ID
        visible: false

      - name: entry_no
        label: Dispatch No
        visible: true
        width: 150

      - name: entry_dt
        label: Date
        visible: true
        dataType: date
        width: 120

      - name: party_name
        label: Customer
        visible: true
        width: 200

      - name: pl_entry_no
        label: Picking List
        visible: true
        width: 150

      - name: pick_dt
        label: Pick Date
        visible: true
        dataType: date
        width: 120

      - name: total_items
        label: Total
        visible: true
        width: 80
        align: right

      - name: picked_items
        label: Picked
        visible: true
        width: 80
        align: right
