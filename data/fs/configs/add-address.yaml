configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Address Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          a.id,
          a.adr1,
          a.adr2,
          a.adr3,
          a.city_id,
          c.name as city_name,
          a.district_id,
          d.name as district_name,
          cd.state_id,
          s.name as state_name,
          s.country_id,
          co.name as country_name
        FROM wms.address a
        LEFT JOIN wms.city c ON a.city_id = c.id
        LEFT JOIN wms.district d ON a.district_id = d.id
        LEFT JOIN wms.city_district cd ON a.city_id = cd.city_id AND a.district_id = cd.district_id
        LEFT JOIN wms.state s ON cd.state_id = s.id
        LEFT JOIN wms.country co ON s.country_id = co.id
        WHERE a.id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create Address
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.insert_address($1, $2, $3, $4, $5, $6, $7, $8) as id;
          payload:
            - adr1
            - adr2
            - adr3
            - city_id
            - district_id
            - state_id
            - country_id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    # Row-based layout
    rows:
      - columns:
          - field: adr1
            span: 12
      - columns:
          - field: adr2
            span: 12
      - columns:
          - field: adr3
            span: 12
      - columns:
          - field: country_id
            span: 6
          - field: state_id
            span: 6
      - columns:
          - field: city_id
            span: 6
          - field: district_id
            span: 6
    
    # Field definitions
    fields:
      - name: adr1
        label: Address Line 1
        type: TEXT
        required: true
      - name: adr2
        label: Address Line 2
        type: TEXT
        required: false
      - name: adr3
        label: Address Line 3
        type: TEXT
        required: false
      
      # Country field
      - name: country_id
        label: Country
        type: SELECT
        required: true
        selectConfig:
          resource: list-countries
          labelField: country_name
          displayField: country_name
          selectHandler: converter
          currentSelection:
            - key: id
              as: country_id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: country_id
            - key: country_name
              as: country_name
      
      # State field - depends on Country
      - name: state_id
        label: State
        type: SELECT
        required: true
        selectConfig:
          resource: list-states
          labelField: state_name
          displayField: state_name
          selectHandler: converter
          currentSelection:
            - key: state_id
              as: state_id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: state_id
            - key: state_name
              as: state_name
        dependencies:
          - target: [country_id]
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: country_id
      
      # City field - depends on State AND District
      - name: city_id
        label: City
        type: SELECT
        required: true
        selectConfig:
          resource: list-cities-by-state-district
          labelField: city_name
          displayField: city_name
          selectHandler: converter
          currentSelection:
            - key: city_id
              as: city_id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: city_id
            - key: city_name
              as: city_name
        dependencies:
          - target: [state_id]
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: state_id
          - target: [district_id]
            handler: filterByDependency
            required: false
            dependencyConfig:
              targetParam: district_id
      
      # District field - depends on State AND City
      - name: district_id
        label: District
        type: SELECT
        required: true
        selectConfig:
          resource: list-districts-by-state-city
          labelField: district_name
          displayField: district_name
          selectHandler: converter
          currentSelection:
            - key: district_id
              as: district_id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: district_id
            - key: district_name
              as: district_name
        dependencies:
          - target: [state_id]
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: state_id
          - target: [city_id]
            handler: filterByDependency
            required: false
            dependencyConfig:
              targetParam: city_id
