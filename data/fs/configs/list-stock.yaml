configType: LIST
version: 1.0
queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT 
      s.id,
      m.name as material_name,
      r.name as rack_name,
      s.qty,
      u.name as uom_name,
      s.rate,
      s.remarks
    FROM wms.stock s
    JOIN wms.material m ON s.material_id = m.id
    JOIN wms.rack r ON s.rack_id = r.id
    JOIN wms.uom u ON s.uom_id = u.id
    WHERE s.is_active = true AND s.qty > 0
  payload: []
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: true

columns:
  - name: id
    label: ID
    visible: false
  - name: material_name
    label: Material
    visible: true
    width: 200
    sortable: true
    filterable: true
  - name: rack_name
    label: Current Location
    visible: true
    width: 150
    sortable: true
    filterable: true
  - name: qty
    label: Quantity
    visible: true
    width: 100
    align: right
    sortable: true
  - name: uom_name
    label: UOM
    visible: true
    width: 80
  - name: rate
    label: Rate
    visible: true
    width: 100
    align: right

actionConfig:
  move:
    label: Move / Transfer
    actionType: DISPLAY_FORM
    level: ROW
    formConfig: process-stock-move
    payload:
      - id
    onSuccess: refresh
