version: 1.0
configName: list-inwards

sections:
  - sectionType: TABLE
    sectionName: inwards
    label: Inwards
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT 
          h.id, h.entry_no, h.entry_dt, v.name as vendor_name,
          h.invoice_no, h.invoice_dt, h.status, sc.label as status_label,
          h.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM wms.inward_header h
        LEFT JOIN wms.vendor v ON h.vendor_id = v.id
        LEFT JOIN administration.user u ON h.lub = u.id
        LEFT JOIN wms.status_code sc ON sc.entity = 'INWARD' AND sc.code = h.status
        WHERE h.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true

    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - process
        - delete

    actionConfig:
      add:
        label: Create Inward
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: inward-details
        mode: ADD
        payload: []
        onSuccess: refresh
      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: inward-details
        mode: VIEW
        payload:
          - id
      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        condition: row.status !== 20
        formConfig: inward-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
      process:
        label: Process
        icon: CheckCircle
        variant: primary
        actionType: EXECUTE_QUERY
        level: ROW
        condition: row.status === 0
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to process Inward Entry '${row.entry_no}'? This will lock the entry and update stock."
        queryInfo:
          query: SELECT wms.process_inward($1, $2) as id
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - process
        onSuccess: refresh
      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        condition: row.status === 0
        confirmationRequired: true
        queryInfo:
          query: UPDATE wms.inward_header SET is_active = false, lub = $2, lua = NOW() WHERE id = $1 RETURNING id
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh

    columns:
      - name: id
        label: ID
        visible: false

      - name: entry_no
        label: Entry No
        visible: true
        sortable: true
        filterable: true
        width: 150

      - name: entry_dt
        label: Entry Date
        visible: true
        dataType: date
        width: 120

      - name: vendor_name
        label: Vendor
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: invoice_no
        label: Invoice No
        visible: true
        width: 150

      - name: status_label
        label: Status
        visible: true
        width: 100

      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 150

      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 150
