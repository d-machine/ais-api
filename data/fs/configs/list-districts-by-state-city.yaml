configType: LIST
version: 1.0

queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT DISTINCT ON (dm.id)
        dm.id,
        dm.name as district_name,
        dm.code as district_code,
        dm.descr,
        cd.state_id,      -- Hidden column for State dependency
        cd.city_id,       -- Hidden column for City dependency
        dm.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.district dm
        LEFT JOIN wms.city_district cd ON dm.id = cd.district_id
        LEFT JOIN administration.user u ON dm.lub = u.id 
      WHERE 
        dm.is_active = true
    ) as districts
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: true
    pageSize: 50
    pageSizeOptions: [10, 25, 50, 100]
    onSuccess: refresh
    onFailure: showErrorPage
  path: []

applicableActions: []

columns:
  - name: id
    label: ID
    visible: false
    sortable: false
  - name: state_id
    label: State ID
    visible: false
    sortable: false
    filterable: true
  - name: city_id
    label: City ID
    visible: false
    sortable: false
    filterable: true
  - name: district_name
    label: District Name
    visible: true
    sortable: true
    filterable: true
    width: 250
  - name: district_code
    label: Code
    visible: true
    sortable: true
    width: 100
  - name: descr
    label: Description
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
    dataType: datetime
    format: "DD/MM/YYYY HH:mm"
    sortable: true
    defaultSort: DESC
  - name: last_updated_by_name
    label: Updated By
    visible: true
