sections:
  - sectionType: FIELDS
    sectionName: Palette Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id as palette_id, descr as descr
        FROM
          wms.palette
        WHERE
          id = $1
      payload:
        - palette_id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create Palette
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: |
            SELECT wms.insert_palette($1, $2) as id;
          payload:
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    fields:
      - name: descr
        label: Descr
        type: TEXTAREA
