version: 1.0
configName: list-hsn

sections:
  - sectionType: TABLE
    sectionName: hsn_list
    label: HSN Codes

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT id, hsn_code, descr, cgst, sgst, igst, utgst
        FROM wms.hsn
        WHERE is_active = true
        ORDER BY hsn_code
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50

    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add HSN
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: hsn-details
        mode: ADD
        payload: []
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: hsn-details
        mode: VIEW
        payload:
          - id
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: hsn-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete HSN '${row.hsn_code}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_hsn($1, $2) as id;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false

      - name: hsn_code
        label: HSN Code
        visible: true
        sortable: true
        filterable: true
        width: 150

      - name: descr
        label: Description
        visible: true
        sortable: true
        filterable: true
        width: 250

      - name: cgst
        label: CGST %
        visible: true
        dataType: number
        align: right
        width: 100

      - name: sgst
        label: SGST %
        visible: true
        dataType: number
        align: right
        width: 100

      - name: igst
        label: IGST %
        visible: true
        dataType: number
        align: right
        width: 100

      - name: utgst
        label: UTGST %
        visible: true
        dataType: number
        align: right
        width: 100
