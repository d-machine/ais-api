version: 1.0
configName: address-details

# Form-level actions (global)
applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE
actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard Changes
      EDIT: Discard Changes
  CLOSE:
    visible: true
    label:
      VIEW: Close

sections:
  # Section 1: Address Details (FIELDS)
  - sectionType: FIELDS
    sectionName: address_details
    label: Address Details

    # Section-level data fetching
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          a.id,
          a.adr1,
          a.adr2,
          a.adr3,
          a.city_id,
          c.name as city_name,
          a.district_id,
          d.name as district_name,
          cd.state_id,
          s.name as state_name,
          s.country_id,
          co.name as country_name
        FROM wms.address a
        LEFT JOIN wms.city c ON a.city_id = c.id
        LEFT JOIN wms.district d ON a.district_id = d.id
        LEFT JOIN wms.city_district cd ON a.city_id = cd.city_id AND a.district_id = cd.district_id
        LEFT JOIN wms.state s ON cd.state_id = s.id
        LEFT JOIN wms.country co ON s.country_id = co.id
        WHERE a.id = $1
      payload:
        - _context.id # Explicit: from initial context
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    # Section-level actions
    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Create Address
          EDIT: Update Address
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query:
            ADD: |
              SELECT wms.insert_address($1, $2, $3, $4, $5, $6, $7, $8) as id;
            EDIT: |
              SELECT wms.update_address($1, $2, $3, $4, $5, $6, $7, $8, $9) as id;
          payload:
            ADD:
              - address_details.adr1
              - address_details.adr2
              - address_details.adr3
              - address_details.city_id
              - address_details.district_id
              - address_details.state_id
              - address_details.country_id
            EDIT:
              - _context.id
              - address_details.adr1
              - address_details.adr2
              - address_details.adr3
              - address_details.city_id
              - address_details.district_id
              - address_details.state_id
              - address_details.country_id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar

      CANCEL:
        label: Discard Changes
        icon: ClipboardX
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    # Row-based layout
    rows:
      - columns:
          - field: adr1
            span: 12
      - columns:
          - field: adr2
            span: 12
      - columns:
          - field: adr3
            span: 12
      - columns:
          - field: country_id
            span: 6
          - field: state_id
            span: 6
      - columns:
          - field: city_id
            span: 6
          - field: district_id
            span: 6

    # Field definitions
    fields:
      - name: adr1
        label: Address Line 1
        type: TEXT
        readonly:
          - VIEW
        required: true

      - name: adr2
        label: Address Line 2
        type: TEXT
        readonly:
          - VIEW
        required: false

      - name: adr3
        label: Address Line 3
        type: TEXT
        readonly:
          - VIEW
        required: false

      - name: country_id
        label: Country
        type: SELECT
        readonly:
          - VIEW
        required: true
        selectConfig:
          resource: list-countries
          displayField: country_name
          selectHandler: converter
          currentSelection:
            - key: country_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: country_id
            - key: country_name
              as: country_name

      - name: state_id
        label: State
        type: SELECT
        readonly:
          - VIEW
        required: true
        selectConfig:
          resource: list-states
          displayField: state_name
          selectHandler: converter
          currentSelection:
            - key: state_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: state_id
            - key: state_name
              as: state_name
        dependencies:
          - target:
              - country_id
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: country_id

      - name: city_id
        label: City
        type: SELECT
        readonly:
          - VIEW
        required: true
        selectConfig:
          resource: list-cities-by-state-district
          displayField: city_name
          selectHandler: converter
          currentSelection:
            - key: city_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: city_id
            - key: city_name
              as: city_name
        dependencies:
          - target:
              - state_id
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: state_id
          - target:
              - district_id
            handler: filterByDependency
            required: false
            dependencyConfig:
              targetParam: district_id

      - name: district_id
        label: District
        type: SELECT
        readonly:
          - VIEW
        required: true
        selectConfig:
          resource: list-districts-by-state-city
          displayField: district_name
          selectHandler: converter
          currentSelection:
            - key: district_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: district_id
            - key: district_name
              as: district_name
        dependencies:
          - target:
              - state_id
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: state_id
          - target:
              - city_id
            handler: filterByDependency
            required: false
            dependencyConfig:
              targetParam: city_id
