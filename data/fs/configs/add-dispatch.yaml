configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Dispatch Header
    applicableActions: [SAVE, CANCEL]
    actionConfig:
      SAVE:
        label: Save & Continue
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.insert_dispatch_header($1, $2, $3, $4, $5, $6, $7) as id;
          payload: [entry_dt, party_id, pl_ids, vehicle_no, driver_name, remarks]
          contextParams: [current_user_id]
        onSuccess:
          callback: openEditForm
          formConfig: edit-dispatch
    fields:
      - name: entry_dt
        label: Date
        type: DATE
        required: true
        defaultValue: TODAY

      - name: party_id
        label: Customer
        type: SELECT
        required: true
        selectConfig:
          resource: list-parties
          displayField: party_name
          selectHandler: converter
          currentSelection:
            - key: party_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: party_id
            - key: party_name
              as: party_name

      - name: pl_ids
        label: Picked Lists
        type: MULTI_SELECT
        required: true
        selectConfig:
          resource: list-picked-lists-by-party
          displayField: entry_no
          selectHandler: concatinator
          currentSelection:
            - key: pl_ids
              as: id
          selectParser: splitter
          fields_to_extract:
            - key: id
              as: pl_ids
        dependencies:
          - target: [party_id]
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: party_id

      - name: vehicle_no
        label: Vehicle No
        type: TEXT

      - name: driver_name
        label: Driver Name
        type: TEXT

      - name: remarks
        label: Remarks
        type: TEXTAREA
