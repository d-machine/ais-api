configType: LIST
version: 1.0
queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT
      vc.id,
      vc.name as category_name,
      vc.discount_percentage,
      vc.is_active,
      vc.lua as last_updated_at,
      TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
    FROM wms.vendor_category vc
    LEFT JOIN administration.user u ON vc.lub = u.id
    WHERE vc.is_active = true
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: true
    pageSize: 50
  path: []

columns:
  - name: id
    label: ID
    visible: false
    sortable: false
  - name: category_name
    label: Category Name
    visible: true
    sortable: true
    filterable: true
    width: 250
  - name: discount_percentage
    label: Discount %
    visible: true
    sortable: true
    dataType: number
    width: 150
  - name: last_updated_at
    label: Last Updated
    visible: true
    sortable: true
    dataType: datetime
    format: "DD/MM/YYYY HH:mm"
    defaultSort: DESC
    width: 180
  - name: last_updated_by_name
    label: Updated By
    visible: true
    width: 180

actionConfig:
  add-vendor-category:
    label: Add Category
    actionType: DISPLAY_FORM
    formConfig: add-vendor-category
    shortcut: F2
  edit-vendor-category:
    label: Edit
    actionType: DISPLAY_FORM
    level: ROW
    formConfig: edit-vendor-category
    payload:
      - id
  delete-vendor-category:
    label: Delete
    actionType: EXECUTE_QUERY
    level: ROW
    confirmationRequired: true
    confirmationMessage: Are you sure you want to delete this vendor category?
    queryInfo:
      returnType: SCALAR
      query: |
        UPDATE wms.vendor_category 
        SET is_active = false, lub = $2, lua = NOW()
        WHERE id = $1
        RETURNING id;
      payload:
        - id
      contextParams:
        - current_user_id
    onSuccess: refresh
    onFailure: showErrorSnackbar
