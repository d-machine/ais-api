version: 1.0
configName: list-brands

sections:
  - sectionType: TABLE
    sectionName: brands
    label: Brands

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          ib.id,
          ib.brand_name,
          icm.id as category_id,
          icm.name as category_name,
          ib.descr,
          ib.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM
          wms.item_brand ib
          LEFT JOIN wms.item_category icm ON ib.category_id = icm.id
          LEFT JOIN administration.user u ON ib.lub = u.id
        WHERE
          ib.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions: [10, 25, 50, 100]

    # Section-level actions (header + row)
    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Brand
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: item-brand-details
        mode: ADD
        payload: []
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: item-brand-details
        mode: VIEW
        payload:
          - id
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: item-brand-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.brand_name}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_item_brand($1, $2) as id;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false

      - name: category_id
        label: Category ID
        visible: false

      - name: brand_name
        label: Brand Name
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: category_name
        label: Category
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: descr
        label: Description
        visible: true

      - name: last_updated_at
        label: Last Updated At
        visible: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        sortable: true
        defaultSort: DESC

      - name: last_updated_by_name
        label: Updated By
        visible: true
