queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        ib.id as brand_id,
        ib.brand_name as brand_name,
        icm.id as category_id,
        icm.name as category_name,
        ib.descr as descr,
        ib.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.item_brand ib
        LEFT JOIN wms.item_category icm ON ib.category_id = icm.id
        LEFT JOIN administration.user u ON ib.lub = u.id
      WHERE
        ib.is_active = true
    ) as item_brands
  options:
    applyFiltering: true
    applySorting: true
    applyPagenation: true
  path:
    - queryInfo
applicableActions:
  - add
  - edit
  - delete
actionConfig:
  add:
    label: Add Brand
    actionType: DISPLAY_FORM 
    formConfig: add-brand 
    onSuccess: refresh
    accessTypeRequired: 7-ADD
  edit:
    label: Edit Brand
    actionType: DISPLAY_FORM
    formConfig: add-brand
    accessTypeRequired: 7-EDIT
    payload:
      - brand_id
    onSuccess: refresh
  delete:
    label: Delete Brand
    actionType: EXECUTE_QUERY
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        SELECT wms.delete_item_brand($1,$2);
      payload:
        - brand_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar  

columns:
  - name: brand_id
    label: ID
    visible: false
  - name: brand_name
    label: Brand Name
    visible: true
  - name: category_name
    label: Category
    visible: true
  - name: descr
    label: Descr
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
  - name: last_updated_by_name
    label: Last Updated BY
    visible: true