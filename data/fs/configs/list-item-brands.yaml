queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        ib.id as brand_id,
        ib.brand_name as brand_name,
        icm.name as category_name,
        ib.descr as descr,
        ib.lua as last_updated_by_name,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.item_brand ib
        LEFT JOIN wms.item_category icm ON ib.category_id = icm.id
        LEFT JOIN administration.user u ON ib.lub = u.id
      WHERE
        ib.is_active = true
    ) as item_brands
  options:
    applyFiltering: true
    applySorting: true
    applyPagenation: true
  path:
    - queryInfo
applicableActions:
  - NEW
  - EDIT
  - DELETE
actionConfig:
  NEW:
    label: Add Brand 
    resourcePath: item-brand 
    accessTypeRequired: BRAND-CREATE
  EDIT:
    lable: Edit Brand
    resourcePath: item-brand 
    accessTypeRequired: BRAND-UPDATE 
    targetParams:
      - key: brand_id
        as: brand_id
  DELETE:
    label: Delete Brand
    actionType: EXECUTE_QUERY
    accessTypeRequired: BRAND-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        SELECT wms.delete_item_brand($1,$2);
      payload:
        - brand_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar  

columns:
  - name: brand_id
    label: ID
    visible: false
  - name: brand_name
    label: Brand Name
    visible: true
  - name: category_name
    label: Category
    visible: true
  - name: descr
    label: Descr
    visible: true
  - name: lua
    label: Last Updated At
    visible: true
  - name: last_updated_by_name
    lable: Last Updated BY
    visible: true