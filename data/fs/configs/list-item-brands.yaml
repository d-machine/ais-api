configType: LIST
version: 1.0

queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        ib.id as id,
        ib.brand_name,
        icm.id as category_id,
        icm.name as category_name,
        ib.descr,
        ib.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.item_brand ib
        LEFT JOIN wms.item_category icm ON ib.category_id = icm.id
        LEFT JOIN administration.user u ON ib.lub = u.id
      WHERE
        ib.is_active = true
    ) as item_brands
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: true
    pageSize: 50
    pageSizeOptions: [10, 25, 50, 100]
    onSuccess: refresh
    onFailure: showErrorPage
  path: []

applicableActions:
  - add
  - edit
  - delete

actionConfig:
  add:
    label: Add Brand
    actionType: DISPLAY_FORM
    shortcut: "F2"
    formConfig: add-item-brand
    onSuccess: refresh
    accessTypeRequired: 7-ADD
  
  edit:
    label: Edit Brand
    actionType: DISPLAY_FORM
    shortcut: "F4"
    level: ROW
    formConfig: edit-item-brand
    payload:
      - id
    onSuccess: refresh
    accessTypeRequired: 7-EDIT
  
  delete:
    label: Delete Brand
    actionType: EXECUTE_QUERY
    shortcut: "F8"
    level: ROW
    confirmationRequired: true
    confirmationMessage: "Are you sure you want to delete '${row.brand_name}'?"
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: SELECT wms.delete_item_brand($1, $2) as id;
      payload:
        - id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - delete
    onSuccess: refresh
    onFailure: showErrorSnackbar

columns:
  - name: id
    label: ID
    visible: false
    sortable: false
  - name: category_id
    label: Category ID
    visible: false
    filterable: true
  - name: brand_name
    label: Brand Name
    visible: true
    sortable: true
    filterable: true
    width: 200
  - name: category_name
    label: Category
    visible: true
    sortable: true
    filterable: true
    width: 200
  - name: descr
    label: Description
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
    dataType: datetime
    format: "DD/MM/YYYY HH:mm"
    sortable: true
    defaultSort: DESC
  - name: last_updated_by_name
    label: Updated By
    visible: true