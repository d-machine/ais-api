sections:
  - sectionType: FIELDS
    sectionName: Transport Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id as transport_id, name as transport_name, descr as descr
        FROM
          wms.transport
        WHERE
          id = $1
      payload:
        - transport_id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create Transport
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: |
            SELECT wms.insert_transport($1, $2, $3) as id;
          payload:
            - transport_name
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    fields:
      - name: transport_name
        label: Transport Name
        type: TEXT
        required: true
      - name: descr
        label: Descr
        type: TEXTAREA
