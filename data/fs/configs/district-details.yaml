version: 1.0
configName: district-details

# Form-level actions (global)
applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE
actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard Changes
      EDIT: Discard Changes
  CLOSE:
    visible: true
    label:
      VIEW: Close

sections:
  # Section 1: District Details (FIELDS)
  - sectionType: FIELDS
    sectionName: district_details
    label: District Details

    # Section-level data fetching
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id,
          name as district_name,
          code as district_code,
          descr
        FROM
          wms.district
        WHERE
          id = $1
      payload:
        - _context.id # Explicit: from initial context
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    # Section-level actions
    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Create District
          EDIT: Update District
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query:
            ADD: |
              SELECT wms.insert_district($1, $2, $3, $4) as id;
            EDIT: |
              SELECT wms.update_district($1, $2, $3, $4, $5) as id;
          payload:
            ADD:
              - district_details.district_name
              - district_details.district_code
              - district_details.descr
            EDIT:
              - _context.id # District ID
              - district_details.district_name
              - district_details.district_code
              - district_details.descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar

      CANCEL:
        label: Discard Changes
        icon: ClipboardX
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    # Row-based layout
    rows:
      - columns:
          - field: district_name
            span: 8
          - field: district_code
            span: 4
      - columns:
          - field: descr
            span: 12

    # Field definitions
    fields:
      - name: district_name
        label: District Name
        type: TEXT
        readonly:
          - VIEW
        required: true

      - name: district_code
        label: District Code
        type: TEXT
        readonly:
          - VIEW
        required: true
        maxLength: 3

      - name: descr
        label: Description
        type: TEXTAREA
        readonly:
          - VIEW
