version: 1.0
configName: rack-details

# Form-level actions (global)
applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE
actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard Changes
      EDIT: Discard Changes
  CLOSE:
    visible: true
    label:
      VIEW: Close

sections:
  # Section 1: Rack Details (FIELDS)
  - sectionType: FIELDS
    sectionName: rack_details
    label: Rack Details

    # Section-level data fetching
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id,
          code,
          name,
          descr,
          capacity
        FROM wms.rack
        WHERE id = $1
      payload:
        - _context.id # Explicit: from initial context
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    # Section-level actions
    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Create Rack
          EDIT: Update Rack
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query:
            ADD: |
              SELECT wms.insert_rack($1, $2, $3, $4, $5) as id;
            EDIT: |
              SELECT wms.update_rack($1, $2, $3, $4, $5, $6) as id;
          payload:
            ADD:
              - rack_details.code
              - rack_details.name
              - rack_details.descr
              - rack_details.capacity
            EDIT:
              - _context.id # ID for update
              - rack_details.code
              - rack_details.name
              - rack_details.descr
              - rack_details.capacity
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar

      CANCEL:
        label: Discard Changes
        icon: ClipboardX
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    fields:
      - name: code
        label: Rack Code
        type: TEXT
        readonly:
          - VIEW
        required: true

      - name: name
        label: Rack Name
        type: TEXT
        readonly:
          - VIEW
        required: true

      - name: descr
        label: Description
        type: TEXTAREA
        readonly:
          - VIEW
        required: false

      - name: capacity
        label: Capacity
        type: NUMBER
        readonly:
          - VIEW
        required: false
