version: 1.0
configName: list-roles

sections:
  - sectionType: TABLE
    sectionName: roles
    label: Roles
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          id, name as role_name, descr,
          lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM administration.role r
        LEFT JOIN administration.user u ON r.lub = u.id
        WHERE r.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true

    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Role
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: role-details
        mode: ADD
        payload: []
        onSuccess: refresh
      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: role-details
        mode: VIEW
        payload:
          - id
      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: role-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        queryInfo:
          query: SELECT administration.delete_role($1, $2) as id
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh

    columns:
      - name: id
        label: ID
        visible: false

      - name: role_name
        label: Role Name
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: descr
        label: Description
        visible: true

      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 150

      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 150
