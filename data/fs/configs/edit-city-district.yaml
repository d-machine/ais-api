configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: City-District Mapping
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          cd.id as id,
          cd.state_id,
          s.name as state_name,
          cd.city_id,
          c.name as city_name,
          cd.district_id,
          d.name as district_name,
          cd.descr
        FROM
          wms.city_district cd
          LEFT JOIN wms.state s ON cd.state_id = s.id
          LEFT JOIN wms.city c ON cd.city_id = c.id
          LEFT JOIN wms.district d ON cd.district_id = d.id
        WHERE
          cd.id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Update Mapping
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.update_city_district($1, $2, $3, $4, $5, $6) as id;
          payload:
            - id
            - city_id
            - district_id
            - state_id
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    # Row-based layout
    rows:
      - columns:
          - field: state_id
            span: 4
          - field: city_id
            span: 4
          - field: district_id
            span: 4
      - columns:
          - field: descr
            span: 12
    
    # Field definitions
    fields:
      - name: state_id
        label: State
        type: SELECT
        required: true
        multi: false
        selectConfig:
          resource: list-states
          displayField: state_name
          selectHandler: converter
          currentSelection:
            - key: id
              as: state_id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: state_id
            - key: state_name
              as: state_name
      - name: city_id
        label: City
        type: SELECT
        required: true
        multi: false
        selectConfig:
          resource: list-cities
          displayField: city_name
          selectHandler: converter
          currentSelection:
            - key: city_id
              as: city_id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: city_id
            - key: city_name
              as: city_name
      - name: district_id
        label: District
        type: SELECT
        required: true
        multi: false
        selectConfig:
          resource: list-districts
          displayField: district_name
          selectHandler: converter
          currentSelection:
            - key: district_id
              as: district_id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: district_id
            - key: district_name
              as: district_name
      - name: descr
        label: Description
        type: TEXTAREA
