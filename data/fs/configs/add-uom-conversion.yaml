configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: UOM Conversion Details
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create Conversion
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.insert_uom_conversion($1, $2, $3, $4) as id;
          payload:
            - uom_id_each
            - uom_id_case
            - no_of_pcs
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    rows:
      - columns:
          - field: uom_id_each
            span: 6
          - field: uom_id_case
            span: 6
      - columns:
          - field: no_of_pcs
            span: 12
    
    fields:
      - name: uom_id_each
        label: Base UOM
        type: SELECT
        required: true
        selectConfig:
          resource: list-uoms
          labelField: uom_name
          displayField: uom_each_name
          selectHandler: converter
          currentSelection:
            - key: uom_id_each
              as: uom_id_each
          selectParser: converter
          fields_to_extract:
            - key: id
              as: uom_id_each
            - key: uom_name
              as: uom_each_name
      - name: uom_id_case
        label: Package UOM
        type: SELECT
        required: true
        selectConfig:
          resource: list-uoms
          labelField: uom_name
          displayField: uom_case_name
          selectHandler: converter
          currentSelection:
            - key: uom_id_case
              as: uom_id_case
          selectParser: converter
          fields_to_extract:
            - key: id
              as: uom_id_case
            - key: uom_name
              as: uom_case_name
      - name: no_of_pcs
        label: Conversion Factor (No. of Base Units in Package)
        type: NUMBER
        required: true
