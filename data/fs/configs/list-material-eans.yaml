version: 1.0
configName: list-material-eans

sections:
  - sectionType: TABLE
    sectionName: material_eans
    label: Material EANs

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          e.id,
          e.material_id,
          e.ean_code,
          e.label,
          e.uom_pc_id,
          u1.name AS uom_pc_name,
          e.uom_package_id,
          u2.name AS uom_package_name,
          e.mrp,
          e.selling_rate
        FROM wms.material_ean e
        LEFT JOIN wms.uom u1 ON e.uom_pc_id = u1.id
        LEFT JOIN wms.uom u2 ON e.uom_package_id = u2.id
        WHERE e.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: false
        applyPagination: false

    columns:
      - name: id
        label: ID
        visible: false

      - name: material_id
        label: Material ID
        visible: false

      - name: ean_code
        label: EAN Code
        visible: true

      - name: label
        label: Label
        visible: true

      - name: uom_pc_id
        label: Base UOM ID
        visible: false

      - name: uom_pc_name
        label: Base UOM
        visible: true

      - name: uom_package_id
        label: Package UOM ID
        visible: false

      - name: uom_package_name
        label: Package UOM
        visible: true

      - name: mrp
        label: MRP
        visible: false

      - name: selling_rate
        label: Selling Rate
        visible: false
