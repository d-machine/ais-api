version: 1.0
configName: list-uoms-by-material-ean

sections:
  - sectionType: TABLE
    sectionName: uoms_by_material_ean
    label: UOMs by Material EAN

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT * FROM (
          SELECT DISTINCT ON (e.uom_pc_id)
            e.uom_pc_id AS id,
            u1.name AS uom_name,
            e.uom_pc_id,
            e.uom_package_id,
            COALESCE(uc.no_of_pcs, 1) AS conversion_factor,
            e.id AS ean_id,
            e.material_id,
            e.selling_rate
          FROM wms.material_ean e
          JOIN wms.uom u1 ON e.uom_pc_id = u1.id
          LEFT JOIN wms.uom_conversion uc ON e.uom_pc_id = uc.uom_id_each AND e.uom_package_id = uc.uom_id_case
          WHERE e.is_active = true AND u1.is_active = true
          UNION
          SELECT DISTINCT ON (e.uom_package_id)
            e.uom_package_id AS id,
            u2.name AS uom_name,
            e.uom_pc_id,
            e.uom_package_id,
            COALESCE(uc.no_of_pcs, 1) AS conversion_factor,
            e.id AS ean_id,
            e.material_id,
            e.selling_rate
          FROM wms.material_ean e
          JOIN wms.uom u2 ON e.uom_package_id = u2.id
          LEFT JOIN wms.uom_conversion uc ON e.uom_pc_id = uc.uom_id_each AND e.uom_package_id = uc.uom_id_case
          WHERE e.is_active = true AND u2.is_active = true
        ) sub
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: false
        applyPagination: false

    columns:
      - name: id
        label: ID
        visible: false

      - name: uom_name
        label: UOM
        visible: true

      - name: uom_pc_id
        label: Base UOM ID
        visible: false

      - name: uom_package_id
        label: Package UOM ID
        visible: false

      - name: conversion_factor
        label: Conversion Factor
        visible: false

      - name: ean_id
        label: EAN ID
        visible: false

      - name: material_id
        label: Material ID
        visible: false

      - name: selling_rate
        label: Selling Rate
        visible: false
