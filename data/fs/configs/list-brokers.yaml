queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        b.id as id,
        b.broker_type as broker_type,
        b.name as broker_name,
        b.add1 as add1,
        b.add2 as add2,
        b.add3 as add3,
        b.city as city,
        b.pincode as pincode,
        b.person_name as person_name,
        b.telephone as telephone,
        b.email as email,
        b.udate as udate,
        b.salesman as salesman,
        b.pan_no as pan_no,
        b.cr_limit as cr_limit,
        b.cr_days as cr_days,
        b.gstno as gstno,
        b.aadhar_no as aadhar_no,
        b.sales_head as sales_head,
        b.director as director,
        b.manager as manager,
        cd.name as city_district_name,
        sm.name as state_name,
        cm.name as country_name,
        b.lua as last_updated_by_name,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.broker b
        LEFT JOIN wms.city_district cd ON b.city_district_id = cd.id
        LEFT JOIN wms.state sm ON b.state_id = sm.id
        LEFT JOIN wms.country cm ON b.country_id = cm.id
        LEFT JOIN administration.user u ON b.lub = u.id
      WHERE
        b.is_active = true
    ) as brokers
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: true
  path: []

applicableActions:
  - NEW
  - EDIT
  - DELETE

actionConfig:
  NEW:
    label: Add Broker
    resourcePath: broker-master
    accessTypeRequired: BROKER-CREATE
  EDIT:
    label: Edit Broker
    resourcePath: broker-master
    accessTypeRequired: BROKER-UPDATE
    targetParams:
      - key: id
        as: broker_id
  DELETE:
    label: Delete Broker
    actionType: EXECUTE_QUERY
    accessTypeRequired: BROKER-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        UPDATE wms.broker
        SET is_active = false, lua = NOW()
        WHERE id = $1;
      payload:
        - id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar

