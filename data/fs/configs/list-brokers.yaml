version: 1.0
configName: list-brokers

sections:
  - sectionType: TABLE
    sectionName: brokers
    label: Brokers
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          b.id, b.broker_type, b.name as broker_name,
          cd.name as city_district_name, sm.name as state_name,
          cm.name as country_name, b.person_name, b.telephone,
          b.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM wms.broker b
        LEFT JOIN wms.city_district cd ON b.city_district_id = cd.id
        LEFT JOIN wms.state sm ON b.state_id = sm.id
        LEFT JOIN wms.country cm ON b.country_id = cm.id
        LEFT JOIN administration.user u ON b.lub = u.id
        WHERE b.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true

    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Broker
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: broker-details
        mode: ADD
        payload: []
        onSuccess: refresh
      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: broker-details
        mode: VIEW
        payload:
          - id
      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: broker-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        queryInfo:
          query: UPDATE wms.broker SET is_active = false, lub = $2, lua = NOW() WHERE id = $1 RETURNING id
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh

    columns:
      - name: id
        label: ID
        visible: false

      - name: broker_name
        label: Broker Name
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: broker_type
        label: Type
        visible: true
        width: 120

      - name: country_name
        label: Country
        visible: true
        width: 120

      - name: state_name
        label: State
        visible: true
        width: 120

      - name: city_district_name
        label: District
        visible: true
        width: 150

      - name: person_name
        label: Contact Person
        visible: true
        width: 150

      - name: telephone
        label: Telephone
        visible: true
        width: 120

      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 150

      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 150
