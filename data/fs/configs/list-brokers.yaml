queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        b.id as broker_id,
        b.broker_type as broker_type,
        b.name as broker_name,
        b.add1 as add1,
        b.add2 as add2,
        b.add3 as add3,
        b.city as city,
        b.pincode as pincode,
        b.person_name as person_name,
        b.telephone as telephone,
        b.email as email,
        b.udate as udate,
        b.salesman as salesman,
        b.pan_no as pan_no,
        b.cr_limit as cr_limit,
        b.cr_days as cr_days,
        b.gstno as gstno,
        b.aadhar_no as aadhar_no,
        b.sales_head as sales_head,
        b.director as director,
        b.manager as manager,
        cd.id as city_district_id,
        cd.name as city_district_name,
        sm.id as state_id,
        sm.name as state_name,
        cm.id as country_id,
        cm.name as country_name,
        b.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.broker b
        LEFT JOIN wms.city_district cd ON b.city_district_id = cd.id
        LEFT JOIN wms.state sm ON b.state_id = sm.id
        LEFT JOIN wms.country cm ON b.country_id = cm.id
        LEFT JOIN administration.user u ON b.lub = u.id
      WHERE
        b.is_active = true
    ) as brokers
  options:
    applyFiltering: true
    applySorting: true
    applyPagenation: true   
  path:
    - queryInfo
applicableActions:
  - add
  - edit
  - delete
actionConfig:
  add:
    label: Add Broker
    actionType: DISPLAY_FORM
    formConfig: add-broker
    onSuccess: refresh
    accessTypeRequired: 7-ADD 
  edit:
    label: Edit Broker
    actionType: DISPLAY_FORM
    formConfig: add-broker
    accessTypeRequired: 7-EDIT
    payload:
      - broker_id
    onSuccess: refresh
  delete:
    label: Delete Broker
    actionType: EXECUTE_QUERY
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        SELECT wms.delete_broker($1, $2) as id;
      payload:
        - broker_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar

