queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        cm.id as city_id,
        cm.name as city_name,
        cm.code as city_code,
        cm.descr as descr,
        cm.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.city cm
        LEFT JOIN administration.user u ON cm.lub = u.id
      WHERE
      cm.is_active = true
    ) as cities
  options:
    applyFiltering: true
    applySorting: true
    applyPagenation: true
  path:
    - queryInfo

applicableActions:
  - NEW
  - EDIT
  - DELETE

actionConfig:
  NEW:
    label: Add City
    resourcePath: city-master
    accessTypeRequired: CITY-CREATE
  EDIT:
    label: Edit City
    resourcePath: city-master
    accessTypeRequired: CITY-UPDATE
    targetParams:
      - key: city_id
        as: city_id
  DELETE:
    label: Delete City
    actionType: EXECUTE_QUERY
    accessTypeRequired: CITY-DELETE
    queryInfo:
      returnType: SCALAR
      query: |
        SELECT wms.delete_city($1, $2);
      payload:
        - city_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refreshList
    onFailure: showErrorSnackbar

columns:
  - name: city_id
    label: ID
    visible: false
  - name: city_name
    label: City Name
    visible: true
  - name: city_code
    label: City Code
    visible: true
  - name: descr
    label: Descr
    visible: true
  - name: lua
    label: Last Updated At
    visible: true
  - name: last_updated_by_name
    label: Last Updated By
    visible: true
