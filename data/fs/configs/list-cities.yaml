queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        cm.id as city_id,
        cm.name as city_name,
        cm.code as city_code,
        cm.descr as descr,
        cm.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.city cm
        LEFT JOIN administration.user u ON cm.lub = u.id
      WHERE
      cm.is_active = true
    ) as cities
  options:
    applyAccessLevelRestrictions: false
    applyFiltering: true
    applySorting: true
    applyPagenation: true
    onSuccess: refresh
    onFailure: showErrorPage
applicableActions:
  - add
  - edit
  - delete

actionConfig:
  add:
    label: Add City
    actionType: DISPLAY_FORM
    formConfig: add-city
    onSuccess: refresh
    accessTypeRequired: 7-ADD 
  edit:
    label: Edit City
    actionType: DISPLAY_FORM
    formConfig: add-city
    accessTypeRequired: 7-EDIT
    payload:
      - city_id
    onSuccess: refresh
  delete:
    label: Delete City
    actionType: EXECUTE_QUERY
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SINGLE_ROW
      query: SELECT wms.delete_city($1, $2) as id;
      payload:
        - city_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refresh
    onFailure: showErrorSnackbar

columns:
  - name: city_id
    label: ID
    visible: false
  - name: city_name
    label: City Name
    visible: true
  - name: city_code
    label: City Code
    visible: true
  - name: descr 
    label: Descr
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
  - name: last_updated_by_name
    label: Last Updated By
    visible: true
