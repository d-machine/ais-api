version: 1.0
configName: list-cities

sections:
  - sectionType: TABLE
    sectionName: cities
    label: Cities

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT * FROM (
          SELECT
            c.id,
            c.name as city_name,
            c.code as city_code,
            c.descr,
            c.lua as last_updated_at,
            TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
          FROM
            wms.city c
            LEFT JOIN administration.user u ON c.lub = u.id
          WHERE
            c.is_active = true
        ) as cities
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions:
          - 10
          - 25
          - 50
          - 100

    # Section-level actions (header + row)
    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add City
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: city-details
        mode: ADD
        payload: []
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: city-details
        mode: VIEW
        payload:
          - id
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: city-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.city_name}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_city($1, $2) as result;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false
      - name: city_name
        label: City Name
        visible: true
        sortable: true
        filterable: true
        width: 250
      - name: city_code
        label: Code
        visible: true
        sortable: true
        width: 100
      - name: descr
        label: Description
        visible: true
      - name: last_updated_at
        label: Last Updated At
        visible: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        sortable: true
        defaultSort: DESC
      - name: last_updated_by_name
        label: Updated By
        visible: true
