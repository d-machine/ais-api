configType: LIST
version: 1.0

queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT DISTINCT ON (c.id)
        c.id,
        c.name as city_name,
        c.code as city_code,
        c.descr,
        cd.state_id,      -- Hidden column for State dependency
        cd.district_id,   -- Hidden column for District dependency
        c.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.city c
        LEFT JOIN wms.city_district cd ON c.id = cd.city_id
        LEFT JOIN administration.user u ON c.lub = u.id
      WHERE
        c.is_active = true
    ) as cities
  options:
    applyFiltering: true
    applySorting: true
    applyPagination: true
    pageSize: 50
    pageSizeOptions: [10, 25, 50, 100]
    onSuccess: refresh
    onFailure: showErrorPage
  path: []

applicableActions: []

columns:
  - name: id
    label: ID
    visible: false
    sortable: false
  - name: state_id
    label: State ID
    visible: false
    sortable: false
    filterable: true
  - name: district_id
    label: District ID
    visible: false
    sortable: false
    filterable: true
  - name: city_name
    label: City Name
    visible: true
    sortable: true
    filterable: true
    width: 250
  - name: city_code
    label: Code
    visible: true
    sortable: true
    width: 100
  - name: descr
    label: Description
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
    dataType: datetime
    format: "DD/MM/YYYY HH:mm"
    sortable: true
    defaultSort: DESC
  - name: last_updated_by_name
    label: Updated By
    visible: true
