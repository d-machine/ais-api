configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Transport Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id, name as transport_name, descr
        FROM
          wms.transport
        WHERE
          id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Update Transport
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: |
            SELECT wms.update_transport($1, $2, $3, $4) as id;
          payload:
            - id
            - transport_name
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    rows:
      - columns:
          - field: transport_name
            span: 12
      - columns:
          - field: descr
            span: 12
            
    fields:
      - name: transport_name
        label: Transport Name
        type: TEXT
        required: true
      - name: descr
        label: Description
        type: TEXTAREA
