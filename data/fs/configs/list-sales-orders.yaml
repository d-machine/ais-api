version: 1.0
configName: list-sales-orders

sections:
  - sectionType: TABLE
    sectionName: sales_orders
    label: Sales Orders
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT * FROM (
          SELECT sh.id, sh.entry_no, sh.entry_dt, sh.party_id,
                 p.name as party_name, b.name as broker_name,
                 sh.status, sc.label as status_label,
                 COALESCE(SUM(sd.eqty), 0) as total_qty,
                 COALESCE(SUM(sd.amount), 0) as total_amount,
                 sh.delivery_dt,
                 sh.lua as last_updated_at,
                 TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
          FROM wms.sales_order_header sh
          JOIN wms.party p ON sh.party_id = p.id
          LEFT JOIN wms.broker b ON sh.broker_id = b.id
          LEFT JOIN wms.sales_order_details sd ON sh.id = sd.header_id AND sd.is_active = true
          LEFT JOIN administration.user u ON sh.lub = u.id
          LEFT JOIN wms.status_code sc ON sc.entity = 'SO' AND sc.code = sh.status
          WHERE sh.is_active = true
          GROUP BY sh.id, sh.entry_no, sh.entry_dt, sh.party_id, p.name, b.name,
                   sh.status, sc.label, sh.delivery_dt, sh.lua,
                   u.first_name, u.last_name
        ) sub
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true

    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Create Order
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: sales-order-details
        mode: ADD
        payload: []
        onSuccess: refresh
      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: sales-order-details
        mode: VIEW
        payload:
          - id
      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: sales-order-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        condition: row.status === 0
        confirmationRequired: true
        queryInfo:
          query: SELECT wms.delete_sales_order_header($1, $2) as id
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh

    columns:
      - name: id
        label: ID
        visible: false

      - name: entry_no
        label: Order No
        visible: true
        sortable: true
        filterable: true
        width: 150

      - name: entry_dt
        label: Date
        visible: true
        dataType: date
        width: 120

      - name: party_name
        label: Customer
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: broker_name
        label: Broker
        visible: true
        width: 150

      - name: total_qty
        label: Total Qty
        visible: true
        dataType: number
        width: 100

      - name: total_amount
        label: Amount
        visible: true
        dataType: currency
        width: 120

      - name: status_label
        label: Status
        visible: true
        width: 120

      - name: delivery_dt
        label: Delivery Date
        visible: true
        dataType: date
        width: 120

      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 150

      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 150
