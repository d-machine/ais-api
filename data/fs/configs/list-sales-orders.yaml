version: 1.0
configName: list-sales-orders

sections:
  - sectionType: TABLE
    sectionName: sales_orders
    label: Sales Orders
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT 
          sh.id, sh.entry_no, sh.entry_dt, p.name as party_name,
          sh.status, sh.delivery_dt,
          sh.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM wms.sales_order_header sh
        JOIN wms.party p ON sh.party_id = p.id
        LEFT JOIN administration.user u ON sh.lub = u.id
        WHERE sh.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true

    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Create Order
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: sales-order-details
        mode: ADD
        payload: []
        onSuccess: refresh
      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: sales-order-details
        mode: VIEW
        payload:
          - id
      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: sales-order-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        condition: row.status === 'Draft'
        confirmationRequired: true
        queryInfo:
          query: UPDATE wms.sales_order_header SET is_active = false, lub = $2, lua = NOW() WHERE id = $1 RETURNING id
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh

    columns:
      - name: id
        label: ID
        visible: false

      - name: entry_no
        label: Order No
        visible: true
        sortable: true
        filterable: true
        width: 150

      - name: entry_dt
        label: Date
        visible: true
        dataType: date
        width: 120

      - name: party_name
        label: Customer
        visible: true
        sortable: true
        filterable: true
        width: 200

      - name: status
        label: Status
        visible: true
        width: 100

      - name: delivery_dt
        label: Delivery Date
        visible: true
        dataType: date
        width: 120

      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 150

      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 150
