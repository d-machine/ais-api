configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: District Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT 
          id,
          name as district_name,
          code as district_code,
          descr
        FROM wms.district
        WHERE id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Update District
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.update_district($1, $2, $3, $4, $5) as id;
          payload:
            - id
            - district_name
            - district_code
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    # Row-based layout
    rows:
      - columns:
          - field: district_name
            span: 8
          - field: district_code
            span: 4
      - columns:
          - field: descr
            span: 12
    
    # Field definitions
    fields:
      - name: district_name
        label: District Name
        type: TEXT
        required: true
      - name: district_code
        label: District Code
        type: TEXT
        required: true
        maxLength: 3
      - name: descr
        label: Description
        type: TEXTAREA
