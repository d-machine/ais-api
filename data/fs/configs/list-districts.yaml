queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT * FROM (
      SELECT
        dm.id as district_id,
        dm.name as district_name,
        dm.code as district_code,
        dm.descr as descr,
        dm.lua as last_updated_at,
        TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
      FROM
        wms.district dm
        LEFT JOIN administration.user u ON dm.lub = u.id 
      WHERE 
        dm.is_active = true
    ) as districts
  options:
    applyAccessLevelRestrictions: false
    applyFiltering: true
    applySorting: true
    applyPagenation: true
    onSuccess: refresh
    onFailure: showErrorPage

applicableActions:
  - add
  - edit
  - delete

actionConfig:
  add:
    label: Add District
    actionType: DISPLAY_FORM
    formConfig: add-district
    onSuccess: refresh
    accessTypeRequired: 7-ADD 
  edit:
    label: Edit District
    actionType: DISPLAY_FORM
    formConfig: add-district
    accessTypeRequired: 7-EDIT
    payload:
      - district_id
    onSuccess: refresh
  delete:
    label: Delete District
    actionType: EXECUTE_QUERY
    accessTypeRequired: 7-DELETE
    queryInfo:
      returnType: SINGLE_ROW
      query: SELECT wms.delete_district($1, $2);
      payload:
        - district_id
      contextParams:
        - current_user_id
      path:
        - actionConfig
        - DELETE
    onSuccess: refresh
    onFailure: showErrorSnackbar

columns:
  - name: district_id
    label: ID
    visible: false
  - name: district_name
    label: District Name
    visible: true
  - name: district_code
    label: District Code
    visible: true
  - name: descr
    label: Descr
    visible: true
  - name: last_updated_at
    label: Last Updated At
    visible: true
  - name: last_updated_by_name
    label: Last Updated By
    visible: true
