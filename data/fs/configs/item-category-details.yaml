version: 1.0
configName: category-details

# Form-level actions (global)
applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE
actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard Changes
      EDIT: Discard Changes
  CLOSE:
    visible: true
    label:
      VIEW: Close

sections:
  # Section 1: Item Category Details (FIELDS)
  - sectionType: FIELDS
    sectionName: category_details
    label: Category Details

    # Section-level data fetching
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id,
          name as item_category_name,
          descr
        FROM
          wms.item_category
        WHERE
          id = $1
      payload:
        - _context.id # Explicit: from initial context
      executionConditions:
        - indices: [0]
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    # Section-level actions
    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Create Category
          EDIT: Update Category
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query:
            ADD: |
              SELECT wms.insert_item_category($1, $2, $3) as id;
            EDIT: |
              SELECT wms.update_item_category($1, $2, $3, $4) as id;
          payload:
            ADD:
              - category_details.item_category_name
              - category_details.descr
            EDIT:
              - _context.id # Category ID
              - category_details.item_category_name
              - category_details.descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar

      CANCEL:
        label: Discard Changes
        icon: ClipboardX
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    # Row-based layout
    rows:
      - columns:
          - field: item_category_name
            span: 12
      - columns:
          - field: descr
            span: 12

    # Field definitions
    fields:
      - name: item_category_name
        label: Category Name
        type: TEXT
        readonly:
          - VIEW
        required: true

      - name: descr
        label: Description
        type: TEXTAREA
        readonly:
          - VIEW
