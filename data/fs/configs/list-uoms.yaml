version: 1.0
configName: list-uoms

sections:
  - sectionType: TABLE
    sectionName: uoms
    label: Unit of Measures

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT * FROM (
          SELECT
            um.id,
            um.name as uom_name,
            um.descr,
            um.lua as last_updated_at,
            TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
          FROM
            wms.uom um
            LEFT JOIN administration.user u ON um.lub = u.id
          WHERE
            um.is_active = true
        ) as uoms
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions:
          - 10
          - 25
          - 50
          - 100

    # Section-level actions (header + row)
    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add UOM
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: uom-details
        mode: ADD
        payload: []
        onSuccess: refresh
        accessTypeRequired: 7-ADD

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: uom-details
        mode: VIEW
        payload:
          - id
        accessTypeRequired: 7-VIEW

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: uom-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh
        accessTypeRequired: 7-EDIT

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete '${row.uom_name}'?"
        accessTypeRequired: 7-DELETE
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_uom_master($1, $2) as result;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar
    columns:
      - name: id
        label: ID
        visible: false
      - name: uom_name
        label: UOM Name
        visible: true
        sortable: true
        filterable: true
        width: 250
      - name: descr
        label: Description
        visible: true
      - name: last_updated_at
        label: Last Updated At
        visible: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        sortable: true
        defaultSort: DESC
      - name: last_updated_by_name
        label: Updated By
        visible: true
