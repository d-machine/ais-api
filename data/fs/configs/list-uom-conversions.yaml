version: 1.0
configName: list-uom-conversions

sections:
  - sectionType: TABLE
    sectionName: uom_conversions
    label: UOM Conversions

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          uc.id,
          uc.uom_id_each,
          uc.uom_id_case,
          u1.name as uom_each_name,
          u2.name as uom_case_name,
          uc.no_of_pcs,
          uc.lua as last_updated_at,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as last_updated_by_name
        FROM wms.uom_conversion uc
        LEFT JOIN wms.uom u1 ON uc.uom_id_each = u1.id
        LEFT JOIN wms.uom u2 ON uc.uom_id_case = u2.id
        LEFT JOIN administration.user u ON uc.lub = u.id
        WHERE uc.is_active = true
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true
        pageSize: 50
        pageSizeOptions:
          - 10
          - 25
          - 50
          - 100

    applicableActions:
      VIEW:
        - add
        - view
        - edit
        - delete

    actionConfig:
      add:
        label: Add Conversion
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        level: HEADER
        shortcut: "F2"
        formConfig: uom-conversion-details
        mode: ADD
        payload: []
        onSuccess: refresh

      view:
        label: View
        icon: Eye
        variant: secondary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F3"
        formConfig: uom-conversion-details
        mode: VIEW
        payload:
          - id

      edit:
        label: Edit
        icon: Edit
        variant: primary
        actionType: DISPLAY_FORM
        level: ROW
        shortcut: "F4"
        formConfig: uom-conversion-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh

      delete:
        label: Delete
        icon: Trash2
        variant: danger
        actionType: EXECUTE_QUERY
        level: ROW
        shortcut: "F8"
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to delete this UOM conversion?"
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.delete_uom_conversion($1, $2) as id;
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - delete
        onSuccess: refresh
        onFailure: showErrorSnackbar

    columns:
      - name: id
        label: ID
        visible: false
        sortable: false
      - name: uom_id_each
        label: Base UOM ID
        visible: false
        filterable: true
      - name: uom_id_case
        label: Package UOM ID
        visible: false
      - name: uom_each_name
        label: Base UOM
        visible: true
        sortable: true
        filterable: true
        width: 200
      - name: uom_case_name
        label: Package UOM
        visible: true
        sortable: true
        filterable: true
        width: 200
      - name: no_of_pcs
        label: Conversion Factor
        visible: true
        sortable: true
        dataType: number
        width: 150
      - name: last_updated_at
        label: Last Updated
        visible: true
        sortable: true
        dataType: datetime
        format: "DD/MM/YYYY HH:mm"
        defaultSort: DESC
        width: 180
      - name: last_updated_by_name
        label: Updated By
        visible: true
        width: 180
