configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Manual Pick
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT 
          $1::numeric as header_id,
          $2::numeric as material_id,
          $3::numeric as rack_id,
          $4 as expiry_dt,
          $5 as batch_no,
          $6::numeric as qty
      payload:
        - header_id
        - material_id
        - rack_id
        - expiry_dt
        - batch_no
        - qty
      path:
        - sections
        - 0
    
    applicableActions:
      - SAVE
      - CANCEL
    
    actionConfig:
      SAVE:
        label: Confirm Pick
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.save_manual_pick($1, $2, $3, $4, $5);

          payload:
            - header_id
            - material_id
            - rack_id
            - expiry_dt
            - qty
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Cancel

    fields:
      - name: header_id
        type: NUMBER
        visible: false
      - name: material_id
        type: NUMBER
        visible: false
      - name: rack_id
        type: NUMBER
        visible: false
      - name: expiry_dt
        label: Expiry Date
        type: DATE
        readonly: true
      - name: batch_no
        label: Batch No
        type: TEXT
        readonly: true
      - name: qty
        label: Pick Quantity
        type: NUMBER
        required: true

