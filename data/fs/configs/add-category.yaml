sections:
  - sectionType: FIELDS
    sectionName: Item Category Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT 
          id as item_category_id,name as item_category_name,descr as descr
        FROM
          wms.item_category
        WHERE
          id = $1
      payload:
        - item_category_id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create Item Category
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query:
            SELECT wms.insert_item_category($1,$2,$3,$4) as id;
          payload:
            - item_category_name
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    fields:
      - name: item_category_name
        label: Item Category Name
        type: TEXT
        required: true
      - name: descr
        label: descr
        type: TEXTAREA
