sections:
  - sectionType: FIELDS
    sectionName: District Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id as district_id,
          name as district_name,
          code as district_code,
          descr as descr
        FROM
          wms.district
        WHERE
          id = $1
      payload:
        - district_id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create District
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: |
            SELECT wms.insert_district($1, $2, $3, $4) as id;
          payload:
            - district_name
            - district_code
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    fields:
      - name: district_name
        label: District Name
        type: TEXT
        required: true
      - name: district_code
        label: District Code
        type: TEXT
        required: true
      - name: descr
        label: Descr
        type: TEXTAREA
