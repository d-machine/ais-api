configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Item Category Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT 
          id,
          name as item_category_name,
          descr
        FROM wms.item_category
        WHERE id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Update Category
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.update_item_category($1, $2, $3, $4) as id;
          payload:
            - id
            - item_category_name
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    # Row-based layout
    rows:
      - columns:
          - field: item_category_name
            span: 12
      - columns:
          - field: descr
            span: 12
    
    # Field definitions
    fields:
      - name: item_category_name
        label: Category Name
        type: TEXT
        required: true
      - name: descr
        label: Description
        type: TEXTAREA
