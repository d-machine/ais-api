configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Inward Header
    applicableActions:
      - SAVE
      - PROCESS
      - CANCEL
    actionConfig:
      SAVE:
        label: Save Header & Continue
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SINGLE_ROW
          query: |
            SELECT * from wms.insert_inward_header($1, $2, $3, $4, $5, $6, $7);
          payload:
            - entry_dt
            - vendor_id
            - po_ids
            - invoice_no
            - invoice_dt
            - remarks
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: updateContextAndEnableNext
          nextSectionToEnable: "Inward Details"
        onFailure: showErrorSnackbar
      PROCESS:
        label: Finish & Process
        actionType: EXECUTE_QUERY
        confirmationRequired: true
        confirmationMessage: "This will lock the Inward Entry and update stock. Continue?"
        queryInfo:
          returnType: SCALAR
          query: |
            /* 1. Insert/Update Header */
            WITH header_op AS (
              SELECT CASE 
                WHEN $1 IS NULL THEN wms.insert_inward_header($2, $3, $4, $5, $6, $7, $8, $9)
                ELSE wms.update_inward_header($1, $2, $3, $4, $5, $6, $7, $8, $9)
              END as id
            )
            /* 2. Process Inward */
            SELECT wms.process_inward((SELECT id FROM header_op), $10) as id;
          payload:
            - id
            - entry_no
            - entry_dt
            - vendor_id
            - po_ids
            - invoice_no
            - invoice_dt
            - remarks
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - PROCESS
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Cancel
    
    rows:
      - columns:
          - field: entry_no
            span: 6
          - field: entry_dt
            span: 6
      - columns:
          - field: vendor_id
            span: 6
          - field: po_ids
            span: 6
      - columns:
          - field: invoice_no
            span: 6
          - field: invoice_dt
            span: 6
      - columns:
          - field: remarks
            span: 12
    
    fields:
      - name: id
        label: ID
        type: NUMBER
        visible: false

      - name: status
        label: Status
        type: TEXT
        visible: false
        defaultValue: "Draft"

      - name: entry_no
        label: Entry No
        type: TEXT
        required: false
        readonly: true
        placeholder: "Auto-generated"
      
      - name: entry_dt
        label: Entry Date
        type: DATE
        required: true
        defaultValue: "TODAY"
      
      - name: vendor_id
        label: Vendor
        type: SELECT
        required: true
        selectConfig:
          resource: list-vendors
          displayField: vendor_name
          selectHandler: converter
          currentSelection:
            - key: vendor_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: vendor_id
            - key: vendor_name
              as: vendor_name

      - name: po_ids
        label: Purchase Orders
        type: SELECT
        required: true
        selectConfig:
          resource: list-purchase-orders
          displayField: po_entry_nos
          selectionMode: multiple
          filtersData:
            - field: vendor_id
              value: "${vendor_id}"
          selectHandler: concatinator
          currentSelection:
            - key: po_ids
              as: id
          selectParser: splitter
          fields_to_extract:
            - key: id
              as: po_ids
            - key: entry_no
              as: po_entry_nos
        dependencies:
          - target: [vendor_id]
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: vendor_id
          - target: [vendor_id]
            handler: toggleReadonly
            condition: "!vendor_id"

      - name: invoice_no
        label: Invoice No
        type: TEXT
        required: false
      
      - name: invoice_dt
        label: Invoice Date
        type: DATE
        required: false
      
      - name: remarks
        label: Remarks
        type: TEXTAREA
        required: false

  - sectionType: TABLE
    sectionName: Inward Details
    disabled:
      condition: isEmpty
      field: id
    
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        /* 1. Existing Inward Rows */
        SELECT 
          d.id,
          'EXISTING' as row_type,
          d.material_id,
          m.name as material_name,
          d.po_detail_id,
          d.quom,
          u.name as uom_name,
          d.eqty,
          d.pqty,
          pod.eqty as po_eqty,
          'Inwarded' as status
        FROM wms.inward_details d
        JOIN wms.material m ON d.material_id = m.id
        LEFT JOIN wms.uom u ON d.quom = u.id
        LEFT JOIN wms.purchase_order_details pod ON d.po_detail_id = pod.id
        WHERE d.header_id = $1
        
        UNION ALL
        
        /* 2. Pending PO Rows */
        SELECT 
          0 as id,
          'PENDING' as row_type,
          pod.item_id as material_id,
          m.name as material_name,
          pod.id as po_detail_id,
          pod.quom,
          u.name as uom_name,
          0 as eqty,
          0 as pqty,
          pod.eqty as po_eqty,
          'Pending' as status
        FROM wms.purchase_order_details pod
        JOIN wms.purchase_order_header poh ON pod.header_id = poh.id
        JOIN wms.material m ON pod.item_id = m.id
        LEFT JOIN wms.uom u ON pod.quom = u.id
        WHERE poh.id = ANY(string_to_array((SELECT po_ids FROM wms.inward_header WHERE id = $1), ',')::int[])
        AND (pod.pqty - pod.iqty) > 0
      payload:
        - id
      path:
        - sections
        - 1
      options:
        applyFiltering: false
        applySorting: false
        applyPagination: false

    columns:
      - name: material_name
        label: Material
        visible: true
        width: 200
      - name: po_eqty
        label: PO Qty
        visible: true
        width: 100
        align: right
      - name: eqty
        label: Inward Qty
        visible: true
        width: 100
        align: right
      - name: status
        label: Status
        visible: true
        width: 100
    
    actionConfig:
      edit:
        label: Edit/Add
        actionType: DISPLAY_FORM
        formConfig: process-inward-detail
        payload:
          - id
          - row_type
          - po_detail_id
          - material_id
          - po_eqty
        onSuccess: refresh
