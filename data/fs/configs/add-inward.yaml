configType: FORM
version: 1.0
applicableActions:
  - FINISH
actionConfig:
  FINISH:
    visible: true
    closeAction: REFRESH
    label: Finish
    variant: primary
sections:
  - sectionType: FIELDS
    sectionName: Inward Header
    applicableActions:
      - SAVE
      - PROCESS
      - CANCEL
    actionConfig:
      SAVE:
        label: Save Header & Continue
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SINGLE_ROW
          query: |
            SELECT * from wms.insert_inward_header($1, $2, $3, $4, $5, $6, $7);
          payload:
            - entry_dt
            - vendor_id
            - po_ids
            - invoice_no
            - invoice_dt
            - remarks
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: SAVE_AND_GO_TO_NEXT
        onFailure: showErrorSnackbar
      PROCESS:
        label: Finish & Process
        actionType: EXECUTE_QUERY
        confirmationRequired: true
        confirmationMessage: "This will lock the Inward Entry and update stock. Continue?"
        queryInfo:
          returnType: SCALAR
          query: |
            /* 1. Insert/Update Header */
            WITH header_op AS (
              SELECT CASE 
                WHEN $1 IS NULL THEN wms.insert_inward_header($2, $3, $4, $5, $6, $7, $8, $9)
                ELSE wms.update_inward_header($1, $2, $3, $4, $5, $6, $7, $8, $9)
              END as id
            )
            /* 2. Process Inward */
            SELECT wms.process_inward((SELECT id FROM header_op), $10) as id;
          payload:
            - id
            - entry_no
            - entry_dt
            - vendor_id
            - po_ids
            - invoice_no
            - invoice_dt
            - remarks
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - PROCESS
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Cancel
    
    rows:
      - columns:
          - field: entry_no
            span: 6
          - field: entry_dt
            span: 6
      - columns:
          - field: vendor_id
            span: 6
          - field: po_ids
            span: 6
      - columns:
          - field: invoice_no
            span: 6
          - field: invoice_dt
            span: 6
      - columns:
          - field: remarks
            span: 12
    
    fields:
      - name: id
        label: ID
        type: NUMBER
        visible: false

      - name: status
        label: Status
        type: TEXT
        visible: false
        defaultValue: "Draft"

      - name: entry_no
        label: Entry No
        type: TEXT
        required: false
        readonly: true
        placeholder: "Auto-generated"
      
      - name: entry_dt
        label: Entry Date
        type: DATE
        required: true
        defaultValue: "TODAY"
      
      - name: vendor_id
        label: Vendor
        type: SELECT
        required: true
        selectConfig:
          resource: list-vendors
          displayField: vendor_name
          selectHandler: converter
          currentSelection:
            - key: vendor_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: vendor_id
            - key: vendor_name
              as: vendor_name

      - name: po_ids
        label: Purchase Orders
        type: SELECT
        required: true
        selectConfig:
          resource: list-purchase-orders
          displayField: po_entry_nos
          selectionMode: multiple
          filtersData:
            - field: vendor_id
              value: "${vendor_id}"
          selectHandler: concatinator
          currentSelection:
            - key: po_ids
              as: id
          selectParser: splitter
          fields_to_extract:
            - key: id
              as: po_ids
            - key: entry_no
              as: po_entry_nos
        dependencies:
          - target: [vendor_id]
            handler: filterByDependency
            required: true
            dependencyConfig:
              targetParam: vendor_id
          - target: [vendor_id]
            handler: toggleReadonly
            condition: "!vendor_id"

      - name: invoice_no
        label: Invoice No
        type: TEXT
        required: false
      
      - name: invoice_dt
        label: Invoice Date
        type: DATE
        required: false
      
      - name: remarks
        label: Remarks
        type: TEXTAREA
        required: false

  - sectionType: TABLE
    sectionName: Inward Details
    disabled:
      condition: isEmpty
      field: id
    
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT 
          -- Header ID (conditional based on row type)
          CASE 
            WHEN id.id IS NOT NULL THEN id.header_id  -- EXISTING: use from inward_details
            ELSE $1                                    -- PENDING: use from parent form context
          END as header_id,
          
          -- PO Detail Info (always from PO)
          pod.id as po_detail_id,
          poh.entry_no as po_entry_no,
          pod.row_no as po_row_no,
          pod.item_id as material_id,
          m.name as material_name,
          pod.quom,
          u.name as uom_name,
          pod.eqty as po_eqty,
          (pod.eqty - COALESCE(pod.iqty, 0)) as balance_qty,
          
          -- Inward Detail Info (if exists for this header)
          id.id as inward_detail_id,
          COALESCE(id.eqty, 0) as inward_qty,
          COALESCE(id.pqty, 0) as physical_qty,
          id.expiry_dt,
          id.batch_no,
          
          -- Row Type Logic
          CASE 
            WHEN id.id IS NOT NULL THEN 'EXISTING'
            ELSE 'PENDING'
          END as row_type
          
        FROM wms.purchase_order_details pod
        JOIN wms.purchase_order_header poh ON pod.header_id = poh.id
        JOIN wms.material m ON pod.item_id = m.id
        LEFT JOIN wms.uom u ON pod.quom = u.id
        
        -- LEFT JOIN to check if inward detail exists for this PO detail + header combo
        LEFT JOIN wms.inward_details id ON 
          id.po_detail_id = pod.id 
          AND id.header_id = $1 
          AND id.is_active = true
        
        WHERE poh.id = ANY(
          string_to_array(
            (SELECT po_ids FROM wms.inward_header WHERE id = $1), 
            ','
          )::int[]
        )
        AND pod.is_active = true
        
        ORDER BY poh.entry_no, pod.row_no
      payload:
        - id
      path:
        - sections
        - 1
      options:
        applyFiltering: false
        applySorting: false
        applyPagination: false

    columns:
      - name: po_entry_no
        label: PO No
        visible: true
        width: 120
      
      - name: po_row_no
        label: Row #
        visible: true
        width: 80
        align: center
      
      - name: material_name
        label: Material
        visible: true
        width: 200
      
      - name: po_eqty
        label: Ordered Qty
        visible: true
        width: 100
        align: right
      
      - name: balance_qty
        label: Balance Qty
        visible: true
        width: 100
        align: right
        dataType: number
      
      - name: inward_qty
        label: Inwarded Qty
        visible: true
        width: 120
        align: right
        dataType: number
    
    actionConfig:
      add:
        label: Add
        actionType: DISPLAY_FORM
        level: ROW
        condition: row.row_type === 'PENDING'
        formConfig: process-inward-detail
        payload:
          - header_id
          - po_detail_id
        onSuccess: refresh
      
      edit:
        label: Edit
        actionType: DISPLAY_FORM
        level: ROW
        condition: row.row_type === 'EXISTING'
        formConfig: process-inward-detail
        payload:
          - header_id
          - inward_detail_id
          - po_detail_id
        onSuccess: refresh
