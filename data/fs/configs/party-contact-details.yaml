version: 1.0
configName: party-contact-details

applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE
actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard Changes
      EDIT: Discard Changes
  CLOSE:
    visible: true
    label:
      VIEW: Close

sections:
  - sectionType: FIELDS
    sectionName: party_contact
    label: Contact Details

    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT id, party_id, name, telephone, email, position, descr
        FROM wms.party_contact_details
        WHERE id = $1
      payload:
        - _context.id
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EXIT

    actionConfig:
      SAVE:
        label:
          ADD: Add Contact
          EDIT: Update Contact
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query:
            ADD: SELECT wms.insert_party_contact($1, $2, $3, $4, $5, $6, $7) as id;
            EDIT: SELECT wms.update_party_contact($1, $2, $3, $4, $5, $6, $7) as id;
          payload:
            ADD:
              - _context.party_id
              - party_contact.name
              - party_contact.telephone
              - party_contact.email
              - party_contact.position
              - party_contact.descr
            EDIT:
              - _context.id
              - party_contact.name
              - party_contact.telephone
              - party_contact.email
              - party_contact.position
              - party_contact.descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar

      CANCEL:
        label: Discard
        icon: X
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

      EXIT:
        label: Close
        icon: X
        variant: secondary
        actionType: NAVIGATE
        onSuccess: exitAndComplete

    rows:
      - columns:
          - field: name
            span: 6
          - field: position
            span: 6
      - columns:
          - field: telephone
            span: 6
          - field: email
            span: 6
      - columns:
          - field: descr
            span: 12

    fields:
      - name: name
        label: Name
        type: TEXT
        readonly:
          - VIEW
        required: true

      - name: position
        label: Position
        type: TEXT
        readonly:
          - VIEW
        required: false

      - name: telephone
        label: Telephone
        type: TEXT
        readonly:
          - VIEW
        required: false

      - name: email
        label: Email
        type: TEXT
        readonly:
          - VIEW
        required: false

      - name: descr
        label: Description
        type: TEXTAREA
        readonly:
          - VIEW
        required: false
