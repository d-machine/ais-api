version: 1.0
configName: state-details

# Form-level actions (global)
applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE
actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard Changes
      EDIT: Discard Changes
  CLOSE:
    visible: true
    label:
      VIEW: Close

sections:
  # Section 1: State Details (FIELDS)
  - sectionType: FIELDS
    sectionName: state_details
    label: State Details

    # Section-level data fetching
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          s.id,
          s.country_id,
          s.name as state_name,
          s.code as state_code,
          s.state_type,
          c.name as country_name,
          s.descr
        FROM
          wms.state s
          LEFT JOIN wms.country c ON s.country_id = c.id
        WHERE
          s.id = $1
      payload:
        - _context.id # Explicit: from initial context
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    # Section-level actions
    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Create State
          EDIT: Update State
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query:
            ADD: |
              SELECT wms.insert_state($1, $2, $3, $4, $5, $6) as id;
            EDIT: |
              SELECT wms.update_state($1, $2, $3, $4, $5, $6, $7) as id;
          payload:
            ADD:
              - state_details.state_name
              - state_details.state_code
              - state_details.descr
              - state_details.country_id
              - state_details.state_type
            EDIT:
              - _context.id # State ID
              - state_details.state_name
              - state_details.state_code
              - state_details.descr
              - state_details.country_id
              - state_details.state_type
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar

      CANCEL:
        label: Discard Changes
        icon: ClipboardX
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    # Row-based layout
    rows:
      - columns:
          - field: state_name
            span: 4
          - field: state_code
            span: 4
          - field: country_id
            span: 4
      - columns:
          - field: state_type
            span: 4
          - field: descr
            span: 8

    # Field definitions
    fields:
      - name: state_name
        label: State Name
        type: TEXT
        readonly:
          - VIEW
        required: true

      - name: state_code
        label: State Code
        type: NUMBER
        readonly:
          - VIEW
        required: true

      - name: descr
        label: Description
        type: TEXTAREA
        readonly:
          - VIEW

      - name: state_type
        label: State Type
        type: SELECT
        readonly:
          - VIEW
        required: true
        selectConfig:
          options:
            - value: STATE
              label: State
            - value: UT
              label: Union Territory (UT)

      - name: country_id
        label: Country
        type: SELECT
        readonly:
          - VIEW
        required: true
        multi: false
        selectConfig:
          resource: list-countries
          displayField: country_name
          selectHandler: converter
          currentSelection:
            - key: country_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: country_id
            - key: country_name
              as: country_name
