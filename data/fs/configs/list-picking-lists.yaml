version: 1.0
configName: list-picking-lists

sections:
  - sectionType: TABLE
    sectionName: picking_lists
    label: Picking Lists
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT * FROM (
          SELECT
            h.id,
            h.entry_no,
            h.entry_dt,
            p.name as party_name,
            h.status,
            (SELECT COUNT(*) FROM wms.picking_list_details d WHERE d.header_id = h.id) as total_items
          FROM wms.picking_list_header h
          JOIN wms.party p ON h.party_id = p.id
        ) sub
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: true
        applyPagination: true

    applicableActions:
      VIEW:
        - add
        - edit

    actionConfig:
      add:
        label: Create Picking List
        icon: Plus
        variant: primary
        actionType: DISPLAY_FORM
        formConfig: picking-list-details
        mode: ADD
        onSuccess: refresh

      edit:
        label: Edit
        icon: Edit
        variant: primary
        level: ROW
        actionType: DISPLAY_FORM
        formConfig: picking-list-details
        mode: EDIT
        payload:
          - id
        onSuccess: refresh

    columns:
      - name: id
        label: ID
        visible: false

      - name: entry_no
        label: Entry No
        visible: true
        width: 120
        sortable: true
        filterable: true

      - name: entry_dt
        label: Date
        visible: true
        dataType: date
        format: "DD/MM/YYYY"
        width: 120
        sortable: true
        defaultSort: DESC

      - name: party_name
        label: Customer
        visible: true
        width: 200
        sortable: true
        filterable: true

      - name: total_items
        label: Items
        visible: true
        width: 100
        align: right

      - name: status
        label: Status
        visible: true
        width: 120
        sortable: true
        filterable: true
