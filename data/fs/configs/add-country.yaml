configType: FORM
version: 1.0
formActions:
  FINISH:
    label: Finish
    visible: false
    actionType: NAVIGATE
    onSuccess: exitAndComplete

sections:
  - sectionType: FIELDS
    sectionName: Country Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id, 
          name as country_name, 
          code as country_code,
          descr
        FROM
          wms.country
        WHERE
          id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create Country
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: |
            SELECT wms.insert_country($1, $2, $3, $4) as id;
          payload:
            - country_name
            - country_code
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: callFinish
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    
    # Row-based layout
    rows:
      - columns:
          - field: country_name
            span: 6
          - field: country_code
            span: 6
      - columns:
          - field: descr
            span: 12
    
    # Field definitions
    fields:
      - name: country_name
        label: Country Name
        type: TEXT
        required: true
      - name: country_code
        label: Country Code
        type: TEXT
        required: true
      - name: descr
        label: Description
        type: TEXTAREA
