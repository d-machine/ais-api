configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Rack Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id,
          code,
          name,
          descr,
          capacity
        FROM wms.rack
        WHERE id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Update
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.update_rack($1, $2, $3, $4, $5, $6) as id;
          payload:
            - id
            - code
            - name
            - descr
            - capacity
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Cancel
    
    fields:
      - name: id
        label: ID
        type: NUMBER
        visible: false
        required: true

      - name: code
        label: Rack Code
        type: TEXT
        required: true
      
      - name: name
        label: Rack Name
        type: TEXT
        required: true
      
      - name: descr
        label: Description
        type: TEXTAREA
        required: false
      
      - name: capacity
        label: Capacity
        type: NUMBER
        required: false
