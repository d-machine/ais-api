sections:
  - sectionType: FIELDS
    sectionName: UOM Details
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          id as id, name as uom_name, descr as descr
        FROM
          wms.uom
        WHERE
          id = $1
      payload:
        - id
      path:
        - sections
        - 0
    applicableActions:
      - SAVE
      - CANCEL
    actionConfig:
      SAVE:
        label: Create UOM
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query: |
            SELECT wms.insert_uom($1, $2, $3) as id;
          payload:
            - uom_name
            - descr
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard Changes
    fields:
      - name: uom_name
        label: UOM Name
        type: TEXT
        required: true
      - name: descr
        label: Descr
        type: TEXTAREA
