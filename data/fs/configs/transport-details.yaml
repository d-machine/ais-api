version: 1.0
configName: transport-details
title: Transport Details

applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE

actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard
      EDIT: Discard
    icon: X
  CLOSE:
    visible: true
    variant: secondary
    label:
      VIEW: Close
    icon: X

sections:
  - sectionType: FIELDS
    sectionName: transport_details
    label: Transport Information
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT id, name as transport_name, descr
        FROM wms.transport
        WHERE id = $1
      payload:
        - _context.id
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Create Transport
          EDIT: Update Transport
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          query:
            ADD: SELECT wms.insert_transport($1, $2, $3) as id
            EDIT: SELECT wms.update_transport($1, $2, $3, $4) as id
          payload:
            ADD:
              - transport_details.transport_name
              - transport_details.descr
            EDIT:
              - _context.id
              - transport_details.transport_name
              - transport_details.descr
          contextParams:
            - current_user_id
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar
      CANCEL:
        label: Discard
        icon: X
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete
      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    rows:
      - columns:
          - field: transport_name
            span: 12
      - columns:
          - field: descr
            span: 12

    fields:
      - name: transport_name
        label: Transport Name
        type: TEXT
        required: true
        readonly:
          - VIEW
      - name: descr
        label: Description
        type: TEXTAREA
        readonly:
          - VIEW
