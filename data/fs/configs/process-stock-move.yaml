configType: FORM
version: 1.0
sections:
  - sectionType: FIELDS
    sectionName: Move Stock
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT 
          s.id as from_stock_id,
          m.name as material_name,
          r.name as current_rack_name,
          s.rack_id as current_rack_id,
          s.qty as current_qty,
          u.name as uom_name
        FROM wms.stock s
        JOIN wms.material m ON s.material_id = m.id
        JOIN wms.rack r ON s.rack_id = r.id
        JOIN wms.uom u ON s.uom_id = u.id
        WHERE s.id = $1
      payload:
        - id
      path:
        - sections
        - 0
    
    applicableActions:
      - SAVE
      - CANCEL
    
    actionConfig:
      SAVE:
        label: Confirm Move
        actionType: EXECUTE_QUERY
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to move this stock?"
        queryInfo:
          returnType: SCALAR
          query: SELECT wms.move_stock($1, $2, $3, $4) as id;
          payload:
            - from_stock_id
            - to_rack_id
            - move_qty
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess: exitAndComplete
        onFailure: showErrorSnackbar
      CANCEL:
        label: Cancel

    fields:
      - name: from_stock_id
        label: Stock ID
        type: NUMBER
        visible: false
        required: true

      - name: material_name
        label: Material
        type: TEXT
        readonly: true
      
      - name: current_rack_name
        label: Current Location
        type: TEXT
        readonly: true
      
      - name: current_qty
        label: Available Quantity
        type: NUMBER
        readonly: true
      
      - name: uom_name
        label: UOM
        type: TEXT
        readonly: true

      - name: to_rack_id
        label: Target Location
        type: SELECT
        required: true
        selectConfig:
          resource: list-racks
          displayField: name
          selectHandler: converter
          currentSelection:
            - key: to_rack_id
              as: to_rack_id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: to_rack_id
            - key: name
              as: name
        dependencies:
          - target: [current_rack_id]
            handler: filterByDependency
            dependencyConfig:
              targetParam: id
              operator: NOT_EQUAL # We might need to implement NOT_EQUAL in frontend or just rely on validation

      - name: move_qty
        label: Quantity to Move
        type: NUMBER
        required: true
        dependencies:
          - target: [current_qty]
            handler: toggleReadonly # Just using this to trigger validation if we had it
            # Ideally we need a 'max' validation. For now, backend handles it.
