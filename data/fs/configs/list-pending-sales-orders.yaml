version: 1.0
configName: list-pending-sales-orders

sections:
  - sectionType: TABLE
    sectionName: pending_sales_orders

    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT * FROM (
          SELECT
            h.id,
            h.entry_no,
            h.entry_dt,
            h.party_id,
            h.delivery_dt,
            h.status
          FROM wms.sales_order_header h
          WHERE h.status = 0
            AND h.is_active = true
          ORDER BY h.entry_dt, h.entry_no
        ) as pending_sales_orders
      path:
        - sections
        - 0
      options:
        applyFiltering: true
        applySorting: false
        applyPagination: false

    columns:
      - name: id
        label: ID
        visible: false
      - name: entry_no
        label: SO No
        visible: true
        width: 120
      - name: entry_dt
        label: SO Date
        visible: true
        dataType: datetime
        format: "DD/MM/YYYY"
        width: 120
      - name: party_id
        label: Party ID
        visible: false
      - name: delivery_dt
        label: Delivery Date
        visible: true
        format: "DD/MM/YYYY"
        width: 120
      - name: status
        label: Status
        visible: true
        width: 100
