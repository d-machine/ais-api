version: 1.0
configName: uom-conversion-details

# Form-level actions (global)
applicableActions:
  ADD:
    - FINISH
    - CANCEL
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE
actionConfig:
  FINISH:
    visible: false
    closeAction: REFRESH
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard Changes
      EDIT: Discard Changes
  CLOSE:
    visible: true
    label:
      VIEW: Close

sections:
  - sectionType: FIELDS
    sectionName: uom_conversion_details
    label: UOM Conversion Details

    # Section-level data fetching
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          uc.id,
          uc.uom_id_each,
          u1.name as uom_each_name,
          uc.uom_id_case,
          u2.name as uom_case_name,
          uc.no_of_pcs
        FROM wms.uom_conversion uc
        LEFT JOIN wms.uom u1 ON uc.uom_id_each = u1.id
        LEFT JOIN wms.uom u2 ON uc.uom_id_case = u2.id
        WHERE uc.id = $1
      payload:
        - _context.id # Explicit: from initial context
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    # Section-level actions
    applicableActions:
      ADD:
        - SAVE
        - CANCEL
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Create Conversion
          EDIT: Update Conversion
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SCALAR
          query:
            ADD: |
              SELECT wms.insert_uom_conversion($1, $2, $3, $4) as id;
            EDIT: |
              SELECT wms.update_uom_conversion($1, $2, $3, $4, $5) as id;
          payload:
            ADD:
              - uom_conversion_details.uom_id_each
              - uom_conversion_details.uom_id_case
              - uom_conversion_details.no_of_pcs
            EDIT:
              - _context.id # UOM Conversion ID
              - uom_conversion_details.uom_id_each
              - uom_conversion_details.uom_id_case
              - uom_conversion_details.no_of_pcs
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
        onFailure: showErrorSnackbar

      CANCEL:
        label: Discard Changes
        icon: ClipboardX
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete

      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    # Row-based layout
    rows:
      - columns:
          - field: uom_id_each
            span: 6
          - field: uom_id_case
            span: 6
      - columns:
          - field: no_of_pcs
            span: 12

    # Field definitions
    fields:
      - name: uom_id_each
        label: Base UOM
        type: SELECT
        readonly:
          - VIEW
        required: true
        selectConfig:
          resource: list-uoms
          displayField: uom_each_name
          selectHandler: converter
          currentSelection:
            - key: uom_id_each
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: uom_id_each
            - key: uom_name
              as: uom_each_name

      - name: uom_id_case
        label: Package UOM
        type: SELECT
        readonly:
          - VIEW
        required: true
        selectConfig:
          resource: list-uoms
          displayField: uom_case_name
          selectHandler: converter
          currentSelection:
            - key: uom_id_case
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: uom_id_case
            - key: uom_name
              as: uom_case_name

      - name: no_of_pcs
        label: Conversion Factor (No. of Base Units in Package)
        type: NUMBER
        readonly:
          - VIEW
        required: true
