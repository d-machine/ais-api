version: 1.0
configName: list-pickers

sections:
  - sectionType: TABLE
    sectionName: pickers
    label: Pickers
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          u.id,
          TRIM(CONCAT(u.first_name, ' ', u.last_name)) as full_name
        FROM administration.user u
        JOIN administration.user_role ur ON u.id = ur.user_id
        JOIN administration.role r ON ur.role_id = r.id
        WHERE r.name = 'picker'
          AND u.is_active = true
        ORDER BY u.first_name, u.last_name
      path:
        - sections
        - 0
      options:
        applyFiltering: false
        applySorting: false
        applyPagination: false

    columns:
      - name: id
        label: ID
        visible: false
      - name: full_name
        label: Name
        visible: true
