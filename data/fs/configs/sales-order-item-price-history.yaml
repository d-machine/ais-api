version: 1.0
configName: sales-order-item-price-history
title: Recent Rates

sections:
  - sectionType: TABLE
    sectionName: price_history
    label: Recent Rates for this Item & Customer
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          soh.entry_no,
          soh.entry_dt,
          sod.rate_per_pc,
          sod.eqty,
          sod.amount
        FROM wms.sales_order_details sod
        JOIN wms.sales_order_header soh ON sod.header_id = soh.id
        WHERE sod.item_id = $1
          AND soh.party_id = (SELECT party_id FROM wms.sales_order_header WHERE id = $2)
          AND sod.is_active = true
          AND soh.is_active = true
        ORDER BY soh.entry_dt DESC
        LIMIT 5
      payload:
        - material_id
        - header_id
      path:
        - sections
        - 0
      options:
        applyFiltering: false
        applySorting: false
        applyPagination: false

    applicableActions:
      VIEW: []

    columns:
      - name: entry_no
        label: SO No
        visible: true
        width: 100

      - name: entry_dt
        label: Date
        visible: true
        dataType: date
        format: "DD/MM/YYYY"
        width: 120

      - name: rate_per_pc
        label: Rate
        visible: true
        align: right
        dataType: currency
        width: 100

      - name: eqty
        label: Qty
        visible: true
        align: right
        dataType: number
        width: 80

      - name: amount
        label: Amount
        visible: true
        align: right
        dataType: currency
        width: 100
