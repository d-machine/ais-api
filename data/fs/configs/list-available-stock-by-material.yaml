configType: LIST
version: 1.0
queryInfo:
  returnType: MULTIPLE_ROWS
  query: |
    SELECT 
      s.id,
      s.rack_id,
      r.code as rack_code,
      s.expiry_dt,
      (s.qty - COALESCE((
          SELECT SUM(d.qty) 
          FROM wms.picking_list_details d 
          JOIN wms.picking_list_header h ON d.header_id = h.id
          WHERE d.material_id = s.material_id 
            AND d.rack_id = s.rack_id 
            AND (d.expiry_dt = s.expiry_dt OR (d.expiry_dt IS NULL AND s.expiry_dt IS NULL))
            AND h.status IN ('Draft', 'Picked') -- Allocated but not yet dispatched
            AND d.is_active = true
      ), 0)) as available_qty,
      (r.code || ' | Avail: ' || (s.qty - COALESCE((
          SELECT SUM(d.qty) 
          FROM wms.picking_list_details d 
          JOIN wms.picking_list_header h ON d.header_id = h.id
          WHERE d.material_id = s.material_id 
            AND d.rack_id = s.rack_id 
            AND (d.expiry_dt = s.expiry_dt OR (d.expiry_dt IS NULL AND s.expiry_dt IS NULL))
            AND h.status IN ('Draft', 'Picked')
            AND d.is_active = true
      ), 0)) || ' | Exp: ' || COALESCE(TO_CHAR(s.expiry_dt, 'DD-Mon-YYYY'), 'N/A')) as display_label
    FROM wms.stock s
    JOIN wms.rack r ON s.rack_id = r.id
    WHERE s.material_id = $1
      AND s.is_active = true
    HAVING (s.qty - COALESCE((
          SELECT SUM(d.qty) 
          FROM wms.picking_list_details d 
          JOIN wms.picking_list_header h ON d.header_id = h.id
          WHERE d.material_id = s.material_id 
            AND d.rack_id = s.rack_id 
            AND (d.expiry_dt = s.expiry_dt OR (d.expiry_dt IS NULL AND s.expiry_dt IS NULL))
            AND h.status IN ('Draft', 'Picked')
            AND d.is_active = true
      ), 0)) > 0
    ORDER BY s.expiry_dt ASC NULLS LAST, s.id ASC
  payload: [material_id]
columns:
  - name: display_label
    label: Stock Batch (FEFO)
