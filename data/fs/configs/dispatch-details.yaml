version: 1.0
configName: dispatch-details
title: Dispatch Details

applicableActions:
  EDIT:
    - FINISH
    - CANCEL
  VIEW:
    - FINISH
    - CLOSE

actionConfig:
  FINISH:
    visible: true
    closeAction: REFRESH
    label: Finish
    variant: primary
  CANCEL:
    visible: true
    variant: danger
    label:
      ADD: Discard
      EDIT: Discard
    icon: X
  CLOSE:
    visible: true
    variant: secondary
    label:
      VIEW: Close
    icon: X

sections:
  - sectionType: FIELDS
    sectionName: dispatch_header
    label: Dispatch Information
    queryInfo:
      returnType: SINGLE_ROW
      query: |
        SELECT
          h.id, h.entry_no, h.entry_dt, h.party_id, p.name as party_name,
          h.pl_ids, plh.entry_no as pl_entry_no,
          h.vehicle_no, h.driver_name, h.status, h.remarks
        FROM wms.dispatch_header h
        JOIN wms.party p ON h.party_id = p.id
        LEFT JOIN wms.picking_list_header plh ON plh.id = h.pl_ids::integer
        WHERE h.id = $1
      payload:
        - _context.id
      executionConditions:
        - indices:
            - 0
          operator: IS_NOT_NIL
      path:
        - sections
        - 0

    applicableActions:
      EDIT:
        - SAVE
        - CANCEL
      VIEW:
        - EDIT

    actionConfig:
      SAVE:
        label:
          ADD: Save & Continue
          EDIT: Save Changes
        icon: Save
        variant: primary
        actionType: EXECUTE_QUERY
        queryInfo:
          returnType: SINGLE_ROW
          query:
            ADD: SELECT wms.insert_dispatch_header($1, $2, $3, $4, $5, $6, $7) as id
            EDIT: SELECT wms.update_dispatch_header($1, $2, $3, $4, $5, $6, $7, $8) as id
          payload:
            ADD:
              - dispatch_header.entry_dt
              - dispatch_header.party_id
              - dispatch_header.pl_ids
              - dispatch_header.vehicle_no
              - dispatch_header.driver_name
              - dispatch_header.remarks
            EDIT:
              - id
              - dispatch_header.entry_no
              - dispatch_header.entry_dt
              - dispatch_header.party_id
              - dispatch_header.pl_ids
              - dispatch_header.vehicle_no
              - dispatch_header.driver_name
              - dispatch_header.remarks
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - SAVE
        onSuccess:
          callback: SAVE_AND_GO_TO_NEXT
        onFailure: showErrorSnackbar
      PROCESS:
        label: Process Dispatch
        icon: Truck
        variant: primary
        actionType: EXECUTE_QUERY
        condition: status === 'Draft'
        confirmationRequired: true
        confirmationMessage: "Are you sure you want to process this dispatch? This will deduct stock and update Sales Orders."
        queryInfo:
          query: SELECT wms.process_picked_dispatch($1, $2) as id
          payload:
            - id
          contextParams:
            - current_user_id
          path:
            - sections
            - 0
            - actionConfig
            - PROCESS
        onSuccess:
          callback: HANDLE_FORM_ACTION
          params:
            action: FINISH
      CANCEL:
        label: Discard
        icon: X
        variant: danger
        actionType: NAVIGATE
        onSuccess: exitAndComplete
      EDIT:
        label: Edit
        icon: Edit
        variant: primary
        actionType: FUNCTION_EXECUTION
        functionInfo:
          name: changeMode
          params:
            mode: EDIT

    rows:
      - columns:
          - field: entry_no
            span: 6
          - field: entry_dt
            span: 6
      - columns:
          - field: party_id
            span: 6
          - field: pl_entry_no
            span: 6
      - columns:
          - field: vehicle_no
            span: 6
          - field: driver_name
            span: 6
      - columns:
          - field: remarks
            span: 12

    fields:
      - name: id
        label: ID
        type: NUMBER
        visible: false
      - name: entry_no
        label: Dispatch No
        type: TEXT
        readonly: true
        placeholder: "Auto-generated"
      - name: entry_dt
        label: Date
        type: DATE
        required: true
        readonly:
          - VIEW
        defaultValue: "TODAY"
      - name: party_id
        label: Customer
        type: SELECT
        required: true
        readonly:
          - VIEW
          - EDIT
        selectConfig:
          resource: list-parties
          displayField: party_name
          selectHandler: converter
          currentSelection:
            - key: party_id
              as: id
          selectParser: converter
          fields_to_extract:
            - key: id
              as: party_id
            - key: party_name
              as: party_name
      - name: pl_ids
        label: Picking List ID
        type: NUMBER
        visible: false
      - name: pl_entry_no
        label: Picking List
        type: TEXT
        readonly: true
      - name: vehicle_no
        label: Vehicle No
        type: TEXT
        readonly:
          - VIEW
      - name: driver_name
        label: Driver Name
        type: TEXT
        readonly:
          - VIEW
      - name: remarks
        label: Remarks
        type: TEXTAREA
        readonly:
          - VIEW
      - name: status
        label: Status
        type: TEXT
        visible: false

  - sectionType: TABLE
    sectionName: dispatch_items
    label: Line Items
    disabled:
      targets:
        - - dispatch_header
          - id
      conditions:
        - operator: IS_NIL
          indices:
            - 0
    queryInfo:
      returnType: MULTIPLE_ROWS
      query: |
        SELECT
          $1::integer as dispatch_id,
          sod.id as so_detail_id,
          sod.item_id as material_id,
          m.name as material_name,
          soh.entry_no as so_entry_no,
          sod.eqty as ordered_qty,
          COALESCE(psa.allocated_qty, 0) as allocated_qty,
          COALESCE(dd_agg.dispatched_qty, 0) as dispatched_qty,
          CASE WHEN COALESCE(dd_agg.dispatched_qty, 0) > 0 THEN 'DISPATCHED' ELSE 'PENDING' END as row_type
        FROM wms.sales_order_details sod
        JOIN wms.sales_order_header soh ON sod.header_id = soh.id
        JOIN wms.material m ON sod.item_id = m.id
        LEFT JOIN (
          SELECT psa.so_detail_id, COALESCE(SUM(psa.qty), 0) as allocated_qty
          FROM wms.picking_list_so_allocation psa
          WHERE psa.header_id = (SELECT pl_ids::integer FROM wms.dispatch_header WHERE id = $1)
            AND psa.is_active = true
          GROUP BY psa.so_detail_id
        ) psa ON psa.so_detail_id = sod.id
        LEFT JOIN (
          SELECT dd.material_id, COALESCE(SUM(dd.qty), 0) as dispatched_qty
          FROM wms.dispatch_details dd
          WHERE dd.header_id = $1 AND dd.is_active = true
          GROUP BY dd.material_id
        ) dd_agg ON dd_agg.material_id = sod.item_id
        WHERE soh.id = ANY(
          string_to_array(
            (SELECT so_ids FROM wms.picking_list_header
             WHERE id = (SELECT pl_ids::integer FROM wms.dispatch_header WHERE id = $1)),
            ','
          )::int[]
        )
        AND sod.is_active = true
        ORDER BY soh.entry_no, m.name
      payload:
        - id
      path:
        - sections
        - 1

    applicableActions:
      EDIT:
        - pick
        - edit_pick
        - view_allocation
      VIEW:
        - view_allocation

    actionConfig:
      pick:
        label: Pick
        icon: Plus
        variant: primary
        level: ROW
        condition: row.row_type === 'PENDING'
        actionType: DISPLAY_FORM
        formConfig: dispatch-pick
        mode: ADD
        payload:
          - dispatch_id
          - material_id
        onSuccess: refresh
      edit_pick:
        label: Edit Pick
        icon: Edit
        variant: primary
        level: ROW
        condition: row.row_type === 'DISPATCHED'
        actionType: DISPLAY_FORM
        formConfig: dispatch-pick
        mode: EDIT
        payload:
          - dispatch_id
          - material_id
        onSuccess: refresh
      view_allocation:
        label: View
        icon: Eye
        variant: secondary
        level: ROW
        condition: row.row_type === 'DISPATCHED' || row.allocated_qty > 0
        actionType: DISPLAY_FORM
        formConfig: process-picking-allocation
        mode: VIEW
        payload:
          - key: dispatch_id
            as: header_id
          - material_id
          - key: allocated_qty
            as: total_pending_qty
          - key: so_detail_id
            as: so_detail_ids

    columns:
      - name: so_entry_no
        label: SO No
        visible: true
        width: 120
      - name: material_name
        label: Material
        visible: true
        width: 250
      - name: ordered_qty
        label: Ordered
        visible: true
        width: 100
        align: right
      - name: allocated_qty
        label: Allocated
        visible: true
        width: 100
        align: right
      - name: dispatched_qty
        label: Dispatched
        visible: true
        width: 100
        align: right
